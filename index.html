  <script>
// ══════════════════════════════════════════════════════════════
// MODULE A: Constanten en configuratie
// ══════════════════════════════════════════════════════════════

const APP_VERSIE        = '1.0.0';
const APP_NAAM          = 'Ulpan Jes';
const AZURE_REGIO       = 'eastus';
const AZURE_RESOURCE    = 'ivriet-speech';
const TTS_STEM_MAN      = 'he-IL-AvriNeural';
const TTS_STEM_VROUW    = 'he-IL-HilaNeural';
const MAX_LES           = 21;
const CORS_PROXY_URL    = 'https://corsproxy.io/?';
const OPSLAG_PREFIXEN   = {
  voortgang:    'ujes_voortgang_',
  srs:          'ujes_srs_',
  lyric:        'ujes_lyric_',
  spelScore:    'ujes_spelscore_',
  streak:       'ujes_streak',
  huidigeLes:   'ujes_huidigeles',
  instellingen: 'ujes_instellingen',
};

// ══════════════════════════════════════════════════════════════
// MODULE B: Hulpfuncties (stripNikud, kiesWillekeurig, etc.)
// ══════════════════════════════════════════════════════════════

/**
 * Verwijdert nikud (vocalisatietekens) uit Hebreeuwse tekst.
 * ALTIJD gebruiken voordat tekst naar Azure TTS wordt gestuurd.
 * @param {string} tekst - Hebreeuwse tekst met of zonder nikud
 * @returns {string} Tekst zonder nikud, lege string bij null/undefined
 */
function stripNikud(tekst) {
  if (!tekst) return '';
  return tekst.replace(/[\u0591-\u05C7]/g, '');
}

/**
 * Selecteert n willekeurige unieke items uit een array.
 * @param {Array} arr - De bronarray
 * @param {number} n - Aantal te selecteren items
 * @returns {Array} Willekeurige selectie, nooit meer dan arr.length
 */
function kiesWillekeurig(arr, n) {
  if (!arr || arr.length === 0) return [];
  if (arr.length <= n) return [...arr].sort(() => Math.random() - 0.5);
  const kopie = [...arr];
  const resultaat = [];
  for (let i = 0; i < n; i++) {
    const idx = Math.floor(Math.random() * kopie.length);
    resultaat.push(kopie.splice(idx, 1)[0]);
  }
  return resultaat;
}

/**
 * Vertaalt een woordsoort-afkorting naar een leesbare Nederlandse term.
 * @param {string} soort - Afkorting (vw, ww, bw, zn, vrg, vgw, vz, bn)
 * @returns {string} Volledige naam
 */
function woordSoortNaam(soort) {
  const NAMEN = {
    vw:  'voornaamwoord',
    ww:  'werkwoord',
    bw:  'bijwoord',
    zn:  'zelfstandig naamwoord',
    vrg: 'vraagwoord',
    vgw: 'voegwoord',
    vz:  'voorzetsel',
    bn:  'bijvoeglijk naamwoord',
  };
  return NAMEN[soort] || soort;
}

// Cache voor welke stem bij welk woord hoort (bepaald per woord, niet per aanroep)
const _woordStemCache = {};
let _afwisselTeller = 0;

/**
 * Bepaalt de juiste stem voor een woord.
 * @param {Object} woord - Woordobject
 * @returns {string} 'man' of 'vrouw'
 */
function bepaalStem(woord) {
  const he = stripNikud(woord.he_clean || '');
  const nl = woord.nl || '';

  if (nl.includes('(mannelijk)')) return 'man';
  if (nl.includes('(vrouwelijk)')) return 'vrouw';
  if (nl.includes('(infinitief)')) return (_afwisselTeller++ % 2 === 0) ? 'man' : 'vrouw';
  if (woord.soort === 'vw') {
    if (he === 'אתה' || he === 'הוא') return 'man';
    if (he === 'את' || he === 'היא') return 'vrouw';
    if (he === 'אני') return (_afwisselTeller++ % 2 === 0) ? 'man' : 'vrouw';
  }
  return 'vrouw';
}

/**
 * Spreekt een woord uit via Azure TTS.
 * Stuurt ALTIJD Hebreeuwse tekst (he_clean) naar Azure.
 * Azure he-IL stemmen spreken Hebreeuws correct uit.
 * @param {Object} woord - Woordobject
 * @returns {Promise<boolean>}
 */
async function spreekWoordUit(woord) {
  // Fix 1: את als voornaamwoord — stuur met nikud zodat Azure "at" zegt
  if (woord.he_clean === 'את' && woord.soort === 'vw') {
    return AudioManager.spreekUit('אַת', 'vrouw');
  }

  // Fix 2: Woorden met twee vormen (m/v) — beide direct na elkaar, klaar daarna
  if (woord.uitspraak && woord.uitspraak.includes('/')) {
    await AudioManager.spreekUit(woord.he, 'man');
    await AudioManager.spreekUit(woord.he_v || woord.he, 'vrouw');
    return true;
  }

  // Alle andere woorden — stuur Hebreeuwse tekst naar Azure
  const stem = bepaalStem(woord);
  return AudioManager.spreekUit(woord.he_clean, stem);
}

/**
 * Geeft het huidige lesnummer van de leerder.
 * @returns {number} Huidig lesnummer (1-19)
 */
function huidigeLes() {
  return Opslag.laad(OPSLAG_PREFIXEN.huidigeLes, 1);
}

// ══════════════════════════════════════════════════════════════
// MODULE C: AppLogger en toast-meldingen
// ══════════════════════════════════════════════════════════════

const AppLogger = {
  DEBUG: new URLSearchParams(window.location.search).has('debug'),

  info  (ctx, msg, data = null) { console.log  (`[${ctx}]`, msg, data ?? ''); },
  warn  (ctx, msg, data = null) { console.warn (`[${ctx}]`, msg, data ?? ''); },
  error (ctx, msg, fout = null) {
    console.error(`[${ctx}]`, msg, fout ?? '');
    toonToast(msg, 'error');
  },
  debug (ctx, msg, data = null) {
    if (this.DEBUG) console.debug(`[${ctx}] DEBUG:`, msg, data ?? '');
  }
};

/**
 * Toont een niet-blokkerende melding rechtsonder in beeld.
 * Verdwijnt automatisch na 5 seconden.
 * @param {string} bericht - De te tonen tekst
 * @param {'error'|'warning'|'info'|'success'} type - Type melding
 */
function toonToast(bericht, type = 'info') {
  const KLEUREN = {
    error:   'bg-red-100 border-red-400 text-red-800',
    warning: 'bg-yellow-100 border-yellow-400 text-yellow-800',
    info:    'bg-blue-100 border-blue-400 text-blue-800',
    success: 'bg-green-100 border-green-400 text-green-800',
  };
  const toast = document.createElement('div');
  toast.className = `fixed bottom-4 right-4 z-50 p-3 border rounded-lg shadow-lg
                     ${KLEUREN[type]} text-sm max-w-xs transition-opacity duration-300`;
  toast.textContent = bericht;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 4700);
}

// ══════════════════════════════════════════════════════════════
// MODULE D: Database laden en vocabulaire-bewaking
// ══════════════════════════════════════════════════════════════

let VOCAB_DB  = null;
let MUZIEK_DB = null;
let SPEL_DB   = null;
let OEFEN_DB  = null;

/**
 * Laadt alle vier databases bij app-start.
 * Slaat ze op als window-variabelen voor globale toegang.
 */
async function laadAlleDatabases() {
  try {
    const [v, m, s, o] = await Promise.all([
      fetch('vocab_database.json'),
      fetch('muziek_database.json'),
      fetch('spelletjes_database.json'),
      fetch('oefenzinnen.json'),
    ]);

    if (!v.ok || !m.ok || !s.ok || !o.ok)
      throw new Error('Een of meer databases niet beschikbaar');

    VOCAB_DB  = await v.json();
    MUZIEK_DB = await m.json();
    SPEL_DB   = await s.json();
    OEFEN_DB  = await o.json();

    window.VOCAB_DB  = VOCAB_DB;
    window.MUZIEK_DB = MUZIEK_DB;
    window.SPEL_DB   = SPEL_DB;
    window.OEFEN_DB  = OEFEN_DB;

    AppLogger.info('DB', `Geladen: ${VOCAB_DB.woorden.length} woorden, ` +
      `${MUZIEK_DB.liederen.length} liedjes, ${OEFEN_DB.zinnen.length} zinnen`);
  } catch(fout) {
    AppLogger.error('DB', 'Failed to load databases', fout);
  }
}

/**
 * Geeft alle woorden terug die de leerder kent na les N.
 * Gebruikt vocab_database.json als enige bron van waarheid.
 * @param {number} lesNummer - Lesnummer (1-19)
 * @returns {Array<Object>} Array van woordobjecten
 */
function getBekendWoorden(lesNummer) {
  if (!VOCAB_DB) return [];
  const sleutel   = String(Math.min(lesNummer, MAX_LES));
  const bekendSet = new Set(
    (VOCAB_DB.bekendNaLes[sleutel] || []).map(w => stripNikud(w).toLowerCase())
  );
  return VOCAB_DB.woorden.filter(w =>
    bekendSet.has(stripNikud(w.he_clean).toLowerCase())
  );
}

/**
 * Geeft de woorden terug die NIEUW zijn in les N
 * (niet aanwezig in les N-1).
 * @param {number} lesNummer - Lesnummer (1-19)
 * @returns {Array<Object>} Nieuwe woorden voor deze les
 */
function getNieuweWoorden(lesNummer) {
  if (!VOCAB_DB) return [];
  return VOCAB_DB.woorden.filter(w => w.les === String(lesNummer));
}

/**
 * Geeft oefenzinnen terug die passen bij het lesniveau.
 * Alleen zinnen met bekende woorden — nooit nieuwe woorden.
 * @param {number} lesNummer - Huidig lesnummer
 * @param {number} max - Maximum aantal zinnen
 * @returns {Array<Object>} Geschikte oefenzinnen
 */
function getBekendZinnen(lesNummer, max = 5) {
  if (!OEFEN_DB) return [];
  return OEFEN_DB.zinnen
    .filter(z => parseInt(z.les) <= lesNummer)
    .sort((a, b) => (a.niveau || 99) - (b.niveau || 99))
    .slice(0, max);
}

// ══════════════════════════════════════════════════════════════
// MODULE E: Lokale opslag (localStorage wrapper)
// ══════════════════════════════════════════════════════════════

const Opslag = {
  /**
   * Slaat een waarde op in localStorage.
   * @param {string} sleutel - De opslagsleutel
   * @param {any} waarde - De op te slaan waarde
   */
  slaOp(sleutel, waarde) {
    try {
      localStorage.setItem(sleutel, JSON.stringify(waarde));
    } catch(fout) {
      AppLogger.warn('Opslag', `Save mislukt: ${sleutel}`, fout.message);
    }
  },

  /**
   * Laadt een waarde uit localStorage.
   * @param {string} sleutel - De opslagsleutel
   * @param {any} standaard - Standaardwaarde bij ontbreken
   * @returns {any} Geladen waarde of standaard
   */
  laad(sleutel, standaard = null) {
    try {
      const raw = localStorage.getItem(sleutel);
      return raw ? JSON.parse(raw) : standaard;
    } catch(fout) {
      AppLogger.warn('Opslag', `Laden mislukt: ${sleutel}`);
      return standaard;
    }
  },

  /**
   * Verwijdert een waarde uit localStorage.
   * @param {string} sleutel - De te verwijderen sleutel
   */
  verwijder(sleutel) {
    localStorage.removeItem(sleutel);
  }
};

// ══════════════════════════════════════════════════════════════
// MODULE F: Azure TTS (AudioManager)
// ══════════════════════════════════════════════════════════════

const AudioManager = {
  AZURE_ENDPOINT: `https://${AZURE_REGIO}.tts.speech.microsoft.com/cognitiveservices/v1`,
  bezig: false,
  huidigAudio: null,

  /**
   * Stopt de huidige audio onmiddellijk.
   */
  stop() {
    if (this.huidigAudio) {
      this.huidigAudio.pause();
      this.huidigAudio.currentTime = 0;
      this.huidigAudio = null;
    }
    if (window.speechSynthesis) speechSynthesis.cancel();
    this.bezig = false;
  },

  /**
   * Spreekt tekst uit via Azure TTS of Web Speech API fallback.
   * Stopt eerst lopende audio als die bezig is.
   * @param {string} tekst - Hebreeuwse tekst (mag nikud bevatten)
   * @param {string} stem - 'man' (Avri) of 'vrouw' (Hila, standaard)
   * @returns {Promise<boolean>} true bij succes, false bij mislukking
   */
  async spreekUit(tekst, stem = 'vrouw') {
    if (!tekst?.trim()) {
      AppLogger.warn('TTS', 'Empty text provided');
      return false;
    }

    // Stop lopende audio voordat nieuwe start
    if (this.bezig) this.stop();

    const stemNaam    = stem === 'man' ? TTS_STEM_MAN : TTS_STEM_VROUW;
    const schoneTekst = tekst.trim();
    const apiSleutel  = window.AZURE_API_SLEUTEL || null;

    // Probeer Azure TTS als API-sleutel beschikbaar is
    if (apiSleutel) {
      const ssml = `<speak version='1.0' xml:lang='he-IL'>
        <voice name='${stemNaam}'>${schoneTekst}</voice>
      </speak>`;

      try {
        this.bezig = true;
        AppLogger.debug('TTS', 'SSML', ssml);
        const resp = await fetch(this.AZURE_ENDPOINT, {
          method: 'POST',
          headers: {
            'Ocp-Apim-Subscription-Key': apiSleutel,
            'Content-Type': 'application/ssml+xml',
            'X-Microsoft-OutputFormat': 'audio-16khz-128kbitrate-mono-mp3',
          },
          body: ssml,
        });

        if (!resp.ok) throw new Error(`Azure TTS HTTP ${resp.status}`);

        const blob  = await resp.blob();
        const url   = URL.createObjectURL(blob);
        const audio = new Audio(url);
        this.huidigAudio = audio;

        await new Promise((resolve, reject) => {
          audio.onended = () => { this.huidigAudio = null; resolve(); };
          audio.onerror = () => { this.huidigAudio = null; reject(); };
          audio.play();
        });

        URL.revokeObjectURL(url);
        this.bezig = false;
        return true;

      } catch(fout) {
        this.bezig = false;
        AppLogger.debug('TTS', 'Azure failed, trying browser speech', fout.message);
      }
    }

    // Fallback: Web Speech API (gratis, geen sleutel nodig)
    return this._webSpeechFallback(schoneTekst);
  },

  /**
   * Web Speech API fallback — werkt zonder Azure sleutel.
   * @param {string} tekst - Tekst om uit te spreken
   * @returns {Promise<boolean>}
   * @private
   */
  _webSpeechFallback(tekst) {
    return new Promise(resolve => {
      if (!window.speechSynthesis) {
        AppLogger.debug('TTS', 'No speech synthesis available');
        resolve(false);
        return;
      }
      const utt = new SpeechSynthesisUtterance(tekst);
      utt.lang = 'he-IL';
      utt.rate = 0.85;
      const stemmen = speechSynthesis.getVoices();
      const heStem = stemmen.find(s => s.lang.startsWith('he'));
      if (heStem) utt.voice = heStem;
      utt.onend = () => resolve(true);
      utt.onerror = () => resolve(false);
      speechSynthesis.cancel();
      speechSynthesis.speak(utt);
    });
  },

  /**
   * Spreekt een Hebreeuws woord uit met expliciete fonetische uitspraak.
   * Gebruikt SSML phoneme tag zodat Azure de correcte uitspraak gebruikt.
   * @param {string} hebreeuws - Hebreeuwse tekst
   * @param {string} fonetiek - Fonetische uitspraak (bijv. "at", "ata")
   * @param {string} stem - 'man' of 'vrouw'
   * @returns {Promise<boolean>}
   */
  async spreekUitMetFonetiek(hebreeuws, fonetiek, stem = 'vrouw') {
    const stemNaam   = stem === 'man' ? TTS_STEM_MAN : TTS_STEM_VROUW;
    const apiSleutel = window.AZURE_API_SLEUTEL || null;
    if (!apiSleutel) return false;

    const ssml = `<speak version='1.0' xml:lang='he-IL'>
      <voice name='${stemNaam}'>
        <phoneme alphabet="x-microsoft-sapi" ph="${fonetiek}">${stripNikud(hebreeuws)}</phoneme>
      </voice>
    </speak>`;

    try {
      this.bezig = true;
      const resp = await fetch(this.AZURE_ENDPOINT, {
        method: 'POST',
        headers: {
          'Ocp-Apim-Subscription-Key': apiSleutel,
          'Content-Type': 'application/ssml+xml',
          'X-Microsoft-OutputFormat': 'audio-16khz-128kbitrate-mono-mp3',
        },
        body: ssml,
      });

      if (!resp.ok) throw new Error(`Azure TTS HTTP ${resp.status}`);

      const blob  = await resp.blob();
      const url   = URL.createObjectURL(blob);
      const audio = new Audio(url);
      await new Promise((resolve, reject) => {
        audio.onended = resolve;
        audio.onerror = reject;
        audio.play();
      });
      URL.revokeObjectURL(url);
      this.bezig = false;
      return true;
    } catch(fout) {
      this.bezig = false;
      // Fallback naar gewone uitspraak
      return this.spreekUit(hebreeuws, stem);
    }
  }
};

// Laad stemmen zodra beschikbaar (sommige browsers laden async)
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => {
    AppLogger.debug('TTS', `${speechSynthesis.getVoices().length} voices loaded`);
  };
}

// ══════════════════════════════════════════════════════════════
// MODULE G: SRS-engine (SM-2 algoritme)
// ══════════════════════════════════════════════════════════════

const SRSEngine = {
  /**
   * Berekent het nieuwe SRS-interval na een antwoord (SM-2 algoritme).
   * @param {Object} huidig - Huidige SRS-data {interval, easiness, repetitions}
   * @param {number} kwaliteit - Antwoordkwaliteit 0-5 (0=totaal fout, 5=perfect)
   * @returns {Object} Bijgewerkte SRS-data inclusief volgendeHerhaling datum
   */
  berekenNieuwInterval(huidig, kwaliteit) {
    let { interval, easiness, repetitions } = huidig;

    if (kwaliteit < 3) {
      repetitions = 0;
      interval    = 1;
    } else {
      if (repetitions === 0)      interval = 1;
      else if (repetitions === 1) interval = 6;
      else                        interval = Math.round(interval * easiness);

      easiness = Math.max(1.3,
        easiness + 0.1 - (5 - kwaliteit) * (0.08 + (5 - kwaliteit) * 0.02)
      );
      repetitions++;
    }

    const datum = new Date();
    datum.setDate(datum.getDate() + interval);

    return {
      interval,
      easiness,
      repetitions,
      volgendeHerhaling: datum.toISOString().split('T')[0]
    };
  },

  /**
   * Geeft woorden terug die vandaag herhaald moeten worden.
   * @param {number} lesNummer - Huidig lesnummer
   * @returns {Array<Object>} Te herhalen woorden
   */
  getWoordenVoorHerhaling(lesNummer) {
    const vandaag = new Date().toISOString().split('T')[0];
    return getBekendWoorden(lesNummer).filter(woord => {
      const srs = Opslag.laad(`${OPSLAG_PREFIXEN.srs}${woord.id}`);
      if (!srs) return true;
      return srs.volgendeHerhaling <= vandaag;
    });
  },

  /**
   * Registreert een antwoord en slaat nieuwe SRS-data op.
   * @param {string} woordId - ID van het geoefende woord
   * @param {number} kwaliteit - Antwoordkwaliteit 0-5
   */
  registreerAntwoord(woordId, kwaliteit) {
    const sleutel  = `${OPSLAG_PREFIXEN.srs}${woordId}`;
    const huidig   = Opslag.laad(sleutel, { interval: 1, easiness: 2.5, repetitions: 0 });
    const nieuw    = this.berekenNieuwInterval(huidig, kwaliteit);
    Opslag.slaOp(sleutel, nieuw);
    AppLogger.debug('SRS', `Woord ${woordId}: kwaliteit ${kwaliteit}, interval ${nieuw.interval}d`);
  }
};

// ══════════════════════════════════════════════════════════════
// MODULE H: StreakManager
// ══════════════════════════════════════════════════════════════

const StreakManager = {
  /**
   * Registreert activiteit voor vandaag en werkt streak bij.
   */
  registreerActiviteit() {
    const vandaag    = new Date().toISOString().split('T')[0];
    const gisteren   = new Date();
    gisteren.setDate(gisteren.getDate() - 1);
    const gisterenStr = gisteren.toISOString().split('T')[0];

    const streak = Opslag.laad(OPSLAG_PREFIXEN.streak,
      { huidig: 0, langste: 0, laatste: null });

    if (streak.laatste === vandaag) return;

    streak.huidig  = streak.laatste === gisterenStr ? streak.huidig + 1 : 1;
    streak.langste = Math.max(streak.langste, streak.huidig);
    streak.laatste = vandaag;

    Opslag.slaOp(OPSLAG_PREFIXEN.streak, streak);
    AppLogger.info('Streak', `Dag ${streak.huidig} (langste: ${streak.langste})`);
  },

  /**
   * Geeft de huidige streakdata terug.
   * @returns {{huidig: number, langste: number, laatste: string|null}}
   */
  getStreak() {
    return Opslag.laad(OPSLAG_PREFIXEN.streak, { huidig: 0, langste: 0, laatste: null });
  }
};

/**
 * Start een les voor het opgegeven lesnummer.
 * Laadt nieuwe woorden uit vocab_database.json.
 * @param {number} lesNummer - Te starten les (1-19)
 */
function startLes(lesNummer) {
  if (!VOCAB_DB || !OEFEN_DB) {
    AppLogger.error('Les', 'Databases niet geladen');
    return;
  }

  const nieuweWoorden = getNieuweWoorden(lesNummer);
  const oefenzinnen   = getBekendZinnen(lesNummer, 5);

  window.huidigeLesData = { lesNummer, nieuweWoorden, oefenzinnen, huidigeFase: 1 };

  StreakManager.registreerActiviteit();
  Opslag.slaOp(OPSLAG_PREFIXEN.huidigeLes, lesNummer);

  AppLogger.info('Les', `Lesson ${lesNummer} gestart`, `${nieuweWoorden.length} nieuwe woorden`);
  toonFase(1);
}

/**
 * Toont de opgegeven fase van de huidige les.
 * @param {number|string} faseNummer - Fase 1, 2, 3, '3b', 4, '5a' of '5b'
 */
function toonFase(faseNummer) {
  window.huidigeLesData.huidigeFase = faseNummer;
  const fasen = {
    1:   toonFase1,
    2:   toonFase2,
    3:   toonFase3,
    '3b': toonFase3b,
    4:   toonFase4,
    '5a': toonFase5a,
    '5b': toonFase5b,
  };
  const fn = fasen[faseNummer];
  if (fn) fn();
  else AppLogger.error('Les', `Ongeldige fase: ${faseNummer}`);
}

 * Leerder hoort + ziet Nederlandse betekenis. Geen Hebreeuws schrift prominent.
 * Geslachtsindicator altijd als onderdeel van de auditieve presentatie.
 * Geen productie gevraagd — affectieve filter laag houden.
 * Vereist Azure API key — zonder audio heeft deze fase geen zin.
 */
async function toonFase1() {
  const woorden   = window.huidigeLesData.nieuweWoorden;
  const container = document.getElementById('les-fase-container');
  if (!container) return;

  let idx = 0;

  const render = async () => {
    if (idx >= woorden.length) { toonFase(2); return; }
    const woord = woorden[idx];
    const betekenis = woord.en || woord.nl;

    container.innerHTML = `
      <div class="min-h-screen bg-blue-50 flex flex-col items-center justify-center p-6">
        <p class="text-sm text-gray-500 mb-1">Lesson ${window.huidigeLesData.lesNummer} — Phase 1 of 7 — Listening</p>
        <p class="text-gray-600 mb-6 text-center">
          Listen and understand. You don't need to do anything yet.
        </p>
        <div class="text-5xl mb-4">🔊</div>
        <div class="text-2xl font-semibold mb-2">${betekenis}</div>
        <div class="text-sm text-gray-400 mb-6">${idx + 1} / ${woorden.length}</div>
        <div class="flex gap-3 mt-2">
          <button onclick="AudioManager.stop(); fase1Terug()" ${idx === 0 ? 'disabled class="opacity-30 border border-gray-300 text-gray-600 rounded-xl px-5 py-3"' : 'class="border border-gray-300 text-gray-600 rounded-xl px-5 py-3"'}>
            ← Back
          </button>
          <button onclick="AudioManager.stop(); fase1Herhaal()"
                  class="border border-blue-400 text-blue-600 rounded-xl px-5 py-3">
            🔊 Repeat
          </button>

                  class="bg-blue-600 text-white rounded-xl px-6 py-3">
            Next →
          </button>
        </div>
      </div>`;

    window.fase1Volgende = () => { idx++; render(); };
    window.fase1Terug = () => { if (idx > 0) { idx--; render(); } };
    window.fase1Herhaal = async () => {
      for (let h = 0; h < 3; h++) {
        await spreekWoordUit(woord);
        await new Promise(r => setTimeout(r, 800));
      }
    };

    // Automatisch 3x uitspreken bij verschijnen
    for (let h = 0; h < 3; h++) {
      await spreekWoordUit(woord);
      await new Promise(r => setTimeout(r, 800));
    }
  };

  render();
}

const SRS_GEWICHTEN = {
  memory:        0.5,
  vertaalkeuze:  0.6,
  woordzoeker:   0.4,
  wordle:        0.7,
  zinsbouwer:    0.8,

  dialoogpuzzel: 0.7,
};

const SPEL_MINIMUMS = {
  memory:        { woorden: 6,  les: 2 },
  vertaalkeuze:  { woorden: 8,  les: 2 },
  woordzoeker:   { woorden: 10, les: 3 },
  wordle:        { woorden: 10, les: 3 },
  zinsbouwer:    { zinnen: 5,   les: 4 },
  'shoresh-sort': { groepen: 2, les: 7 },
  dialoogpuzzel: { zinnen: 10,  les: 8 },
};

/**
 * Geeft bekende woorden uit spelletjes_database.json voor het huidige lesniveau.
 * @param {number} lesNummer - Huidig lesnummer
 * @returns {Array<Object>} Woorden met id, he, nl, uitspraak, shoresh etc.
 */
function getSpelWoorden(lesNummer) {
  if (!SPEL_DB) return [];
  const bekendSet = new Set(
    (VOCAB_DB.bekendNaLes[String(Math.min(lesNummer, MAX_LES))] || [])
      .map(w => stripNikud(w).toLowerCase())
  );
  return SPEL_DB.woorden.filter(w =>
    bekendSet.has(stripNikud(w.he_clean).toLowerCase())
  );
}

/**
 * Geeft memory-paren terug die passen bij het lesniveau.
 * @param {number} lesNummer - Huidig lesnummer
 * @param {number} aantalParen - Gewenst aantal paren
 * @returns {Array<Object>} Memory-paren
 */
function getMemoryParen(lesNummer, aantalParen = 6) {
  if (!SPEL_DB) return [];
  const bekendSet = new Set(
    (VOCAB_DB.bekendNaLes[String(Math.min(lesNummer, MAX_LES))] || [])
      .map(w => stripNikud(w).toLowerCase())
  );
  const geschikt = SPEL_DB.memory_paren.filter(p =>
    bekendSet.has(stripNikud(p.he).toLowerCase())
  );
  return kiesWillekeurig(geschikt, aantalParen);
}

/**
 * Registreert een spelresultaat in localStorage.
 * @param {number} woordId - ID van het woord
 * @param {string} spelType - Type spelletje
 * @param {boolean} correct - Of het antwoord correct was
 */
function registreerSpelResultaat(woordId, spelType, correct) {
  const sleutel = `${OPSLAG_PREFIXEN.spelScore}${woordId}`;
  const score = Opslag.laad(sleutel, { correct: 0, fout: 0 });
  if (correct) score.correct++; else score.fout++;
  Opslag.slaOp(sleutel, score);
  AppLogger.debug('Spel', `${spelType}: woord ${woordId} ${correct ? 'correct' : 'fout'}`);
}

    { id: 'shoresh-sort',  naam: 'Root sort',         icon: '🌳', beschrijving: 'Sort words by root' },
    { id: 'dialoogpuzzel', naam: 'Dialogue puzzle',   icon: '💬', beschrijving: 'Put the dialogue in the right order' },
  ];

  menu.innerHTML = `
    <div class="p-6">
      <div class="flex items-center gap-4 mb-6">
        <button onclick="renderStartScherm(); toonScherm('screen-start')"
                class="text-2xl text-gray-400">←</button>
        <h2 class="text-xl font-bold">Games</h2>
      </div>
      <div class="space-y-3">
        ${spellen.map(s => {
          const min = SPEL_MINIMUMS[s.id];
          const beschikbaar = lesNummer >= min.les;
          return `
            <button ${beschikbaar ? `onclick="openSpelletje('${s.id}')"` : 'disabled'}
                    class="w-full flex items-center gap-4 p-4 rounded-xl text-left
                           ${beschikbaar ? 'bg-white shadow-sm hover:shadow-md' : 'bg-gray-100 opacity-50'}">
              <span class="text-3xl">${s.icon}</span>
              <div>
                <div class="font-semibold">${s.naam}</div>
                <div class="text-sm text-gray-500">
                  ${beschikbaar ? s.beschrijving : `Available from lesson ${min.les}`}
                </div>
              </div>
            </button>`;
        }).join('')}
      </div>
    </div>`;
}

/**
 * Opent een specifiek spelletje.
 * @param {string} spelId - ID van het spelletje
 */
function openSpelletje(spelId) {
  const les = huidigeLes();

  // Verberg menu, toon game-div
  document.getElementById('games-menu').classList.add('hidden');
  document.querySelectorAll('[id^="game-"]').forEach(el => el.classList.add('hidden'));

  if (spelId === 'memory') startMemory(les);
  else if (spelId === 'vertaalkeuze') startVertaalkeuze(les);
  else if (spelId === 'woordzoeker') startWoordzoeker(les);
  else if (spelId === 'wordle') startWordle(les);
  else if (spelId === 'zinsbouwer') startZinsbouwer(les);
  else if (spelId === 'shoresh-sort') startShoreshSort(les);
  else if (spelId === 'dialoogpuzzel') startDialoogpuzzel(les);
  else toonToast(`${spelId} wordt binnenkort beschikbaar`, 'info');
}

/**
 * Gaat terug naar het spelletjesmenu.
 */
function terugNaarSpelMenu() {
  document.querySelectorAll('[id^="game-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById('games-menu').classList.remove('hidden');
  renderGamesMenu(huidigeLes());
}

// ── Spelletje 1: Memory ─────────────────────────────────────

const MEMORY_CONFIG = { AANTAL_PAREN: 6, TOON_TIJD_MS: 1000, ANIMATIE_MS: 300 };
let memoryStaat = null;

/**
 * Start een nieuw Memory-spel.
 * @param {number} lesNummer - Huidig lesnummer
 */
function startMemory(lesNummer) {
  const paren = getMemoryParen(lesNummer, MEMORY_CONFIG.AANTAL_PAREN);
  if (paren.length < 3) {
    toonToast('Not enough words for Memory', 'warning');
    terugNaarSpelMenu();
    return;
  }

  // Maak kaartjes: voor elk paar een HE-kaart en een NL-kaart
  const kaartjes = [];
  paren.forEach((paar, i) => {
    kaartjes.push({
      id: `he_${i}`, paarId: i, inhoud: paar.he, type: 'he',
      uitspraak: paar.uitspraak, woordId: paar.id, omgedraaid: false, gevonden: false
    });
    kaartjes.push({
      id: `nl_${i}`, paarId: i, inhoud: paar.nl, type: 'nl',
      uitspraak: paar.uitspraak, woordId: paar.id, omgedraaid: false, gevonden: false
    });
  });

  // Schud kaartjes
  for (let i = kaartjes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [kaartjes[i], kaartjes[j]] = [kaartjes[j], kaartjes[i]];
  }

  memoryStaat = {
    kaartjes,
    eersteKeuze: null,
    tweedeKeuze: null,
    bezig: false,
    aantalAttempts: 0,
    aantalFound: 0,
    totaalParen: paren.length,
  };

  document.getElementById('game-memory').classList.remove('hidden');
  renderMemoryBord();
}

/**
 * Rendert het Memory-bord.
 */
function renderMemoryBord() {
  const bord = document.getElementById('memory-bord');
  if (!bord) return;

  bord.innerHTML = memoryStaat.kaartjes.map(k => `
    <div onclick="klikMemoryKaartje('${k.id}')"
         class="w-20 h-20 flex items-center justify-center rounded-xl cursor-pointer
                text-center text-sm font-semibold select-none transition-all
                ${k.gevonden ? 'bg-green-100 border-2 border-green-400' :
                  k.omgedraaid ? 'bg-white border-2 border-blue-400 shadow-md' :
                  'bg-blue-600 text-blue-600 hover:bg-blue-500'}">
      ${k.omgedraaid || k.gevonden ?
        (k.type === 'he' ?
          `<span class="font-hebrew text-lg" dir="rtl" lang="he">${k.inhoud}</span>` :
          `<span class="text-xs">${k.inhoud}</span>`) :
        '<span class="text-white text-2xl">?</span>'}
    </div>
  `).join('');

  document.getElementById('memory-scores').textContent =
    `Attempts: ${memoryStaat.aantalAttempts} | Found: ${memoryStaat.aantalFound}/${memoryStaat.totaalParen}`;
}

/**
 * Verwerkt een klik op een Memory-kaartje.
 * @param {string} kaartId - ID van het geklikte kaartje
 */
function klikMemoryKaartje(kaartId) {
  if (memoryStaat.bezig) return;

  const kaart = memoryStaat.kaartjes.find(k => k.id === kaartId);
  if (!kaart || kaart.omgedraaid || kaart.gevonden) return;

  kaart.omgedraaid = true;
  renderMemoryBord();

  if (!memoryStaat.eersteKeuze) {
    memoryStaat.eersteKeuze = kaart;
    return;
  }

  // Tweede kaart omgedraaid
  memoryStaat.tweedeKeuze = kaart;
  memoryStaat.bezig = true;
  memoryStaat.aantalAttempts++;

  const match = memoryStaat.eersteKeuze.paarId === memoryStaat.tweedeKeuze.paarId;

  setTimeout(() => {
    if (match) {
      memoryStaat.eersteKeuze.gevonden = true;
      memoryStaat.tweedeKeuze.gevonden = true;
      memoryStaat.aantalFound++;
      registreerSpelResultaat(kaart.woordId, 'memory', true);
      AudioManager.spreekUit(kaart.type === 'he' ? kaart.inhoud : memoryStaat.eersteKeuze.inhoud, 'vrouw');
    } else {
      memoryStaat.eersteKeuze.omgedraaid = false;
      memoryStaat.tweedeKeuze.omgedraaid = false;
      registreerSpelResultaat(kaart.woordId, 'memory', false);
    }

    memoryStaat.eersteKeuze = null;
    memoryStaat.tweedeKeuze = null;
    memoryStaat.bezig = false;
    renderMemoryBord();

    if (memoryStaat.aantalFound === memoryStaat.totaalParen) {
      toonMemoryEinde();
    }
  }, match ? MEMORY_CONFIG.ANIMATIE_MS : MEMORY_CONFIG.TOON_TIJD_MS);
}

/**
 * Toont het einde-scherm van Memory.
 */
function toonMemoryEinde() {
  const einde = document.getElementById('memory-einde');
  if (!einde) return;
  einde.classList.remove('hidden');
  einde.innerHTML = `
    <div class="p-4">
      <p class="text-xl font-bold text-green-700 mb-2">🎉 All pairs found!</p>
      <p class="text-gray-600 mb-4">${memoryStaat.aantalAttempts} pogingen</p>
      <button onclick="terugNaarSpelMenu()" class="px-6 py-2 bg-blue-600 text-white rounded-xl">
        ← Back naar spelletjes
      </button>
    </div>`;
}

// ── Spelletje 2: Vertaalkeuze ───────────────────────────────

const VERTAAL_CONFIG = { AANTAL_VRAGEN: 10, AANTAL_KEUZES: 3, FEEDBACK_MS: 800 };
let vertaalStaat = null;

/**
 * Start een nieuw Vertaalkeuze-spel.
 * @param {number} lesNummer - Huidig lesnummer
 */
function startVertaalkeuze(lesNummer) {
  const woorden = getSpelWoorden(lesNummer);
  if (woorden.length < VERTAAL_CONFIG.AANTAL_KEUZES) {
    toonToast('Not enough words for Vertaalkeuze', 'warning');
    terugNaarSpelMenu();
    return;
  }

  // Maak vragen: kies N woorden, voor elk 3 keuzes (1 correct + 2 afleiders van hetzelfde soort)
  const vraagWoorden = kiesWillekeurig(woorden, Math.min(VERTAAL_CONFIG.AANTAL_VRAGEN, woorden.length));
  const vragen = vraagWoorden.map(juist => {
    const zelfdesoort = woorden.filter(w => w.soort === juist.soort && w.id !== juist.id);
    const afleiders = kiesWillekeurig(
      zelfdesoort.length >= 2 ? zelfdesoort : woorden.filter(w => w.id !== juist.id),
      VERTAAL_CONFIG.AANTAL_KEUZES - 1
    );
    const keuzes = kiesWillekeurig([juist, ...afleiders], VERTAAL_CONFIG.AANTAL_KEUZES);
    return { juist, keuzes };
  });

  vertaalStaat = {
    vragen,
    huidigeVraag: 0,
    aantalCorrect: 0,
  };

  document.getElementById('game-vertaalkeuze').classList.remove('hidden');
  renderVertaalkeuze();
}

/**
 * Rendert de huidige Vertaalkeuze-vraag.
 */
function renderVertaalkeuze() {
  const container = document.getElementById('vertaal-container');
  if (!container) return;
  const { vragen, huidigeVraag, aantalCorrect } = vertaalStaat;

  if (huidigeVraag >= vragen.length) {
    toonVertaalEinde();
    return;
  }

  const vraag = vragen[huidigeVraag];

  container.innerHTML = `
    <div class="text-center">
      <p class="text-sm text-gray-500 mb-2">Vraag ${huidigeVraag + 1}/${vragen.length}</p>
      <div class="font-hebrew text-4xl mb-6 p-4 bg-blue-50 rounded-xl"
           dir="rtl" lang="he">${vraag.juist.he}</div>
      <p class="text-sm text-gray-600 mb-4">Choose the correct translation</p>
      <div class="space-y-3">
        ${vraag.keuzes.map(k => `
          <button onclick="kiesVertaalAntwoord(${k.id}, ${vraag.juist.id})"
                  class="vertaal-btn w-full p-4 border-2 border-gray-200 rounded-xl text-left
                         hover:border-blue-400 transition-colors bg-white"
                  data-id="${k.id}">
            ${k.nl}
          </button>
        `).join('')}
      </div>
      <p class="text-sm text-gray-400 mt-4">Score: ${aantalCorrect}/${huidigeVraag}</p>
    </div>`;
}

/**
 * Verwerkt een antwoord in Vertaalkeuze.
 * @param {number} gekozenId - ID van het gekozen woord
 * @param {number} juistId - ID van het correcte woord
 */
function kiesVertaalAntwoord(gekozenId, juistId) {
  const correct = gekozenId === juistId;
  if (correct) vertaalStaat.aantalCorrect++;
  registreerSpelResultaat(juistId, 'vertaalkeuze', correct);

  // Visuele feedback
  document.querySelectorAll('.vertaal-btn').forEach(btn => {
    btn.disabled = true;
    btn.style.pointerEvents = 'none';
    const id = parseInt(btn.dataset.id);
    if (id === juistId) btn.classList.add('bg-green-100', 'border-green-500');
    else if (id === gekozenId && !correct) btn.classList.add('bg-red-100', 'border-red-500');
  });

  setTimeout(() => {
    vertaalStaat.huidigeVraag++;
    renderVertaalkeuze();
  }, VERTAAL_CONFIG.FEEDBACK_MS);
}

/**
 * Toont het einde-scherm van Vertaalkeuze.
 */
function toonVertaalEinde() {
  const container = document.getElementById('vertaal-container');
  if (!container) return;
  const { aantalCorrect, vragen } = vertaalStaat;
  const pct = Math.round((aantalCorrect / vragen.length) * 100);

  container.innerHTML = `
    <div class="text-center p-4">
      <p class="text-xl font-bold ${pct >= 70 ? 'text-green-700' : 'text-orange-600'} mb-2">
        ${pct >= 70 ? '🎉 Well done!' : '💪 Keep practicing!'}
      </p>
      <p class="text-3xl font-bold mb-2">${pct}%</p>
      <p class="text-gray-600 mb-6">${aantalCorrect} van ${vragen.length} correct</p>
      <div class="space-y-3">
        <button onclick="startVertaalkeuze(huidigeLes())"
                class="w-full py-3 bg-blue-600 text-white rounded-xl">Play again</button>
        <button onclick="terugNaarSpelMenu()"
                class="w-full py-3 bg-gray-200 text-gray-700 rounded-xl">← Back naar spelletjes</button>
      </div>
    </div>`;
}

// ── Spelletje 3: Woordzoeker ─────────────────────────────────

const ZOEKER_CONFIG = { RASTERGROOTTE: 8, AANTAL_WOORDEN: 6, RICHTINGEN: [[0,1],[1,0],[1,1]] };
const HE_LETTERS = 'אבגדהוזחטיכלמנסעפצקרשת';
let zoekerStaat = null;

/**
 * Start een nieuw Woordzoeker-spel.
 * @param {number} lesNummer - Huidig lesnummer
 */
function startWoordzoeker(lesNummer) {
  const woorden = getSpelWoorden(lesNummer)
    .filter(w => stripNikud(w.he_clean).length >= 2 && stripNikud(w.he_clean).length <= 6);
  if (woorden.length < ZOEKER_CONFIG.AANTAL_WOORDEN) {
    toonToast('Not enough words for Woordzoeker', 'warning');
    terugNaarSpelMenu();
    return;
  }

  const gekozen = kiesWillekeurig(woorden, ZOEKER_CONFIG.AANTAL_WOORDEN);
  const grootte = ZOEKER_CONFIG.RASTERGROOTTE;

  // Leeg raster
  const raster = Array.from({ length: grootte }, () => Array(grootte).fill(''));

  // Plaats woorden in het raster
  const geplaatst = [];
  for (const w of gekozen) {
    const letters = stripNikud(w.he_clean).split('').reverse(); // RTL → omkeren voor plaatsing
    const placed = plaatsWoordInRaster(raster, letters, grootte);
    if (placed) {
      geplaatst.push({ ...w, letters, cellen: placed });
    }
  }

  // Vul lege cellen met willekeurige Hebreeuwse letters
  for (let r = 0; r < grootte; r++) {
    for (let k = 0; k < grootte; k++) {
      if (!raster[r][k]) raster[r][k] = HE_LETTERS[Math.floor(Math.random() * HE_LETTERS.length)];
    }
  }

  zoekerStaat = {
    raster,
    woorden: geplaatst,
    gevonden: new Set(),
    selectie: [],
  };

  document.getElementById('game-woordzoeker').classList.remove('hidden');
  renderWoordzoeker();
}

/**
 * Probeert een woord op een willekeurige plek in het raster te plaatsen.
 * @param {Array<Array<string>>} raster
 * @param {Array<string>} letters
 * @param {number} grootte
 * @returns {Array<{r:number,k:number}>|null} Celposities of null
 */
function plaatsWoordInRaster(raster, letters, grootte) {
  const richtingen = ZOEKER_CONFIG.RICHTINGEN;
  // Probeer 50x een willekeurige positie en richting
  for (let poging = 0; poging < 50; poging++) {
    const richting = richtingen[Math.floor(Math.random() * richtingen.length)];
    const [dr, dk] = richting;
    const startR = Math.floor(Math.random() * grootte);
    const startK = Math.floor(Math.random() * grootte);

    // Check of het woord past
    let past = true;
    const cellen = [];
    for (let i = 0; i < letters.length; i++) {
      const r = startR + i * dr;
      const k = startK + i * dk;
      if (r < 0 || r >= grootte || k < 0 || k >= grootte) { past = false; break; }
      if (raster[r][k] && raster[r][k] !== letters[i]) { past = false; break; }
      cellen.push({ r, k });
    }

    if (past) {
      cellen.forEach((cel, i) => { raster[cel.r][cel.k] = letters[i]; });
      return cellen;
    }
  }
  return null;
}

/**
 * Rendert het Woordzoeker-raster en de woordenlijst.
 */
function renderWoordzoeker() {
  const rasterEl = document.getElementById('zoeker-raster');
  const lijstEl = document.getElementById('zoeker-woordenlijst');
  if (!rasterEl || !lijstEl) return;
  const { raster, woorden, gevonden } = zoekerStaat;
  const grootte = ZOEKER_CONFIG.RASTERGROOTTE;

  // Markeer gevonden cellen
  const gevondenCellen = new Set();
  woorden.forEach(w => {
    if (gevonden.has(stripNikud(w.he_clean)) && w.cellen) {
      w.cellen.forEach(c => gevondenCellen.add(`${c.r},${c.k}`));
    }
  });

  // Markeer geselecteerde cellen
  const selectieSet = new Set(zoekerStaat.selectie.map(c => `${c.r},${c.k}`));

  rasterEl.innerHTML = `
    <div class="grid grid-cols-8 gap-1" dir="rtl">
      ${raster.map((rij, r) =>
        rij.map((letter, k) => {
          const key = `${r},${k}`;
          const isFound = gevondenCellen.has(key);
          const isSelected = selectieSet.has(key);
          return `<button onclick="klikZoekerCel(${r},${k})"
                    class="w-9 h-9 flex items-center justify-center font-hebrew text-lg rounded
                           ${isFound ? 'bg-green-200 text-green-800' :
                             isSelected ? 'bg-blue-200 text-blue-800' :
                             'bg-white hover:bg-gray-100'} border"
                    dir="rtl" lang="he">${letter}</button>`;
        }).join('')
      ).join('')}
    </div>`;

  lijstEl.innerHTML = woorden.map(w => {
    const key = stripNikud(w.he_clean);
    const found = gevonden.has(key);
    return `<div class="flex justify-between p-2 rounded ${found ? 'bg-green-50 line-through' : 'bg-white'}">
      <span class="font-hebrew" dir="rtl" lang="he">${w.he_clean}</span>
      <span class="text-sm text-gray-500">${w.nl}</span>
    </div>`;
  }).join('');

  if (gevonden.size === woorden.length) {
    lijstEl.innerHTML += `
      <div class="text-center mt-4">
        <p class="text-xl font-bold text-green-700 mb-3">🎉 All words found!</p>
        <button onclick="terugNaarSpelMenu()" class="px-6 py-2 bg-blue-600 text-white rounded-xl">
          ← Back naar spelletjes
        </button>
      </div>`;
  }
}

/**
 * Verwerkt een klik op een cel in het Woordzoeker-raster.
 * @param {number} r - Rij
 * @param {number} k - Kolom
 */
function klikZoekerCel(r, k) {
  zoekerStaat.selectie.push({ r, k });
  controleerZoekerSelectie();
  renderWoordzoeker();
}

/**
 * Checkt of de huidige selectie een woord vormt.
 */
function controleerZoekerSelectie() {
  const sel = zoekerStaat.selectie;
  if (sel.length < 2) return;

  const geselecteerdeLetters = sel.map(c => zoekerStaat.raster[c.r][c.k]).join('');

  for (const w of zoekerStaat.woorden) {
    const key = stripNikud(w.he_clean);
    if (zoekerStaat.gevonden.has(key)) continue;
    const woordLetters = key.split('').reverse().join(''); // Omgekeerd want raster is RTL-geplaatst
    if (geselecteerdeLetters === woordLetters || geselecteerdeLetters === key) {
      zoekerStaat.gevonden.add(key);
      registreerSpelResultaat(w.id, 'woordzoeker', true);
      AudioManager.spreekUit(w.he_clean, 'vrouw');
      zoekerStaat.selectie = [];
      return;
    }
  }

  // Als selectie langer is dan langste woord, reset
  const maxLen = Math.max(...zoekerStaat.woorden.map(w => stripNikud(w.he_clean).length));
  if (sel.length >= maxLen) {
    zoekerStaat.selectie = [];
  }
}

// ── Spelletje 4: Wordle-variant ─────────────────────────────

const WORDLE_CONFIG = { MAX_POGINGEN: 6 };
const HE_KEYBOARD = [
  ['ק','ר','א','ט','ו','ן','מ','פ'],
  ['ש','ד','ג','כ','ע','י','ח','ל'],
  ['ז','ס','ב','ה','נ','ת','צ'],
];
let wordleStaat = null;

/**
 * Start een nieuw Wordle-spel.
 * @param {number} lesNummer - Huidig lesnummer
 */
function startWordle(lesNummer) {
  // Alleen werkwoorden (soort='ww') met 3-5 letters
  const woorden = getSpelWoorden(lesNummer)
    .filter(w => w.soort === 'ww' && stripNikud(w.he_clean).length >= 3 && stripNikud(w.he_clean).length <= 5);
  if (woorden.length < 1) {
    toonToast('Niet genoeg werkwoorden voor Wordle', 'warning');
    terugNaarSpelMenu();
    return;
  }

  const doelwoord = kiesWillekeurig(woorden, 1)[0];
  const doelLetters = stripNikud(doelwoord.he_clean).split('');

  wordleStaat = {
    doelwoord,
    doelLetters,
    woordLengte: doelLetters.length,
    pogingen: [],
    huidigeInvoer: [],
    klaar: false,
    toetsStatus: {}, // letter → 'correct' | 'aanwezig' | 'afwezig'
  };

  document.getElementById('game-wordle').classList.remove('hidden');
  renderWordle();
}

/**
 * Rendert het Wordle-spelbord en keyboard.
 */
function renderWordle() {
  const container = document.getElementById('wordle-container');
  if (!container) return;
  const { doelwoord, woordLengte, pogingen, huidigeInvoer, klaar, toetsStatus } = wordleStaat;

  // Attempts-raster
  let rasterHTML = '';
  for (let p = 0; p < WORDLE_CONFIG.MAX_POGINGEN; p++) {
    let rijHTML = '';
    for (let l = 0; l < woordLengte; l++) {
      let letter = '';
      let kleur = 'border-gray-300 bg-white';

      if (p < pogingen.length) {
        // Eerder ingevoerde poging — toon met kleuren
        letter = pogingen[p].letters[l];
        const status = pogingen[p].status[l];
        if (status === 'correct') kleur = 'bg-green-500 text-white border-green-500';
        else if (status === 'aanwezig') kleur = 'bg-yellow-400 text-white border-yellow-400';
        else kleur = 'bg-gray-400 text-white border-gray-400';
      } else if (p === pogingen.length && l < huidigeInvoer.length) {
        // Huidige invoer
        letter = huidigeInvoer[l];
        kleur = 'border-blue-400 bg-blue-50';
      }

      rijHTML += `<div class="w-12 h-12 border-2 ${kleur} rounded flex items-center justify-center
                       font-hebrew text-xl font-bold" dir="rtl" lang="he">${letter}</div>`;
    }
    rasterHTML += `<div class="flex gap-1 justify-center mb-1" dir="rtl">${rijHTML}</div>`;
  }

  // Hint
  const hintHTML = klaar ? '' : `<p class="text-sm text-gray-500 mb-2 text-center">
    ${doelwoord.nl} — ${woordLengte} letters</p>`;

  // Keyboard
  let keyboardHTML = HE_KEYBOARD.map(rij =>
    `<div class="flex gap-1 justify-center mb-1">${rij.map(letter => {
      const status = toetsStatus[letter] || '';
      const kleur = status === 'correct' ? 'bg-green-500 text-white' :
                    status === 'aanwezig' ? 'bg-yellow-400 text-white' :
                    status === 'afwezig' ? 'bg-gray-300 text-gray-500' :
                    'bg-gray-100 hover:bg-gray-200';
      return `<button onclick="wordleToets('${letter}')"
                class="w-8 h-10 rounded font-hebrew text-sm ${kleur}"
                dir="rtl" lang="he">${letter}</button>`;
    }).join('')}</div>`
  ).join('');

  // Functietoetsen
  keyboardHTML += `<div class="flex gap-2 justify-center mt-1">
    <button onclick="wordleToets('WISSEN')" class="px-4 py-2 bg-red-100 text-red-700 rounded text-sm">← Wissen</button>
    <button onclick="wordleToets('ENTER')" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">Enter ✓</button>
  </div>`;

  // Resultaat
  let resultaatHTML = '';
  if (klaar) {
    const gewonnen = pogingen.some(p => p.status.every(s => s === 'correct'));
    resultaatHTML = `<div class="text-center mt-4 p-4 rounded-xl ${gewonnen ? 'bg-green-50' : 'bg-red-50'}">
      <p class="text-lg font-bold ${gewonnen ? 'text-green-700' : 'text-red-700'} mb-1">
        ${gewonnen ? '🎉 Correct!' : '💪 Volgende keer beter!'}
      </p>
      <p class="font-hebrew text-2xl mb-1" dir="rtl" lang="he">${doelwoord.he_clean}</p>
      <p class="text-gray-600 text-sm mb-3">${doelwoord.uitspraak} — ${doelwoord.nl}</p>
      <div class="flex gap-2 justify-center">
        <button onclick="startWordle(huidigeLes())" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm">Again</button>
        <button onclick="terugNaarSpelMenu()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-xl text-sm">← Back</button>
      </div>
    </div>`;
  }

  container.innerHTML = `
    <div class="text-center">
      <p class="text-sm text-gray-500 mb-2">Wordle — guess the verb</p>
      ${hintHTML}
      <div class="mb-4">${rasterHTML}</div>
      ${klaar ? '' : `<div class="mb-2">${keyboardHTML}</div>`}
      ${resultaatHTML}
    </div>`;
}

/**
 * Verwerkt een toetsaanslag in Wordle.
 * @param {string} toets - Hebreeuwse letter, 'ENTER' of 'WISSEN'
 */
function wordleToets(toets) {
  if (wordleStaat.klaar) return;

  if (toets === 'WISSEN') {
    wordleStaat.huidigeInvoer.pop();
  } else if (toets === 'ENTER') {
    if (wordleStaat.huidigeInvoer.length !== wordleStaat.woordLengte) return;
    wordleEvalueer();
  } else {
    if (wordleStaat.huidigeInvoer.length < wordleStaat.woordLengte) {
      wordleStaat.huidigeInvoer.push(toets);
    }
  }

  renderWordle();
}

/**
 * Evalueert de huidige Wordle-invoer.
 */
function wordleEvalueer() {
  const { doelLetters, huidigeInvoer, pogingen, toetsStatus, doelwoord } = wordleStaat;
  const status = [];

  // Stap 1: markeer correcte posities
  const doelKopie = [...doelLetters];
  for (let i = 0; i < huidigeInvoer.length; i++) {
    if (huidigeInvoer[i] === doelLetters[i]) {
      status[i] = 'correct';
      doelKopie[i] = null;
    }
  }

  // Stap 2: markeer aanwezige maar verkeerd geplaatste letters
  for (let i = 0; i < huidigeInvoer.length; i++) {
    if (status[i]) continue;
    const idx = doelKopie.indexOf(huidigeInvoer[i]);
    if (idx !== -1) {
      status[i] = 'aanwezig';
      doelKopie[idx] = null;
    } else {
      status[i] = 'afwezig';
    }
  }

  // Update toetsstatus
  huidigeInvoer.forEach((letter, i) => {
    const huidigeStatus = toetsStatus[letter];
    if (status[i] === 'correct') toetsStatus[letter] = 'correct';
    else if (status[i] === 'aanwezig' && huidigeStatus !== 'correct') toetsStatus[letter] = 'aanwezig';
    else if (!huidigeStatus) toetsStatus[letter] = 'afwezig';
  });

  pogingen.push({ letters: [...huidigeInvoer], status });
  wordleStaat.huidigeInvoer = [];

  // Check of gewonnen of verloren
  const gewonnen = status.every(s => s === 'correct');
  if (gewonnen || pogingen.length >= WORDLE_CONFIG.MAX_POGINGEN) {
    wordleStaat.klaar = true;
    registreerSpelResultaat(doelwoord.id, 'wordle', gewonnen);
  }
}

// ── Spelletje 5: Sentence builder ──────────────────────────────────

let zinsbouwerStaat = null;

/**
 * Start een nieuw Sentence builder-spel.
 * @param {number} lesNummer - Huidig lesnummer
 */
function startZinsbouwer(lesNummer) {
  const zinnen = getBekendZinnen(lesNummer, 20);
  if (zinnen.length < 3) {
    toonToast('Not enough sentences for Sentence builder', 'warning');
    terugNaarSpelMenu();
    return;
  }

  const gekozen = kiesWillekeurig(zinnen, Math.min(8, zinnen.length));
  const vragen = gekozen.map(z => {
    // Verwijder nummering en leestekens aan begin/eind van woorden
    const woorden = z.zin
      .replace(/[\u200f\u200e\u202b\u202c]/g, '')
      .split(/\s+/)
      .map(w => w.replace(/^[\d.]+/, '').replace(/[.,!?;:]+$/, ''))
      .filter(w => w.length > 0);
    const geschud = [...woorden].sort(() => Math.random() - 0.5);
    return { origineel: z.zin, juisteVolgorde: woorden, geschud, geplaatst: [] };
  });

  zinsbouwerStaat = { vragen, huidigeVraag: 0, aantalCorrect: 0 };

  document.getElementById('game-zinsbouwer').classList.remove('hidden');
  renderZinsbouwer();
}

/**
 * Rendert de huidige Sentence builder-vraag.
 */
function renderZinsbouwer() {
  const container = document.getElementById('zinsbouwer-container');
  if (!container) return;
  const { vragen, huidigeVraag, aantalCorrect } = zinsbouwerStaat;

  if (huidigeVraag >= vragen.length) {
    const pct = Math.round((aantalCorrect / vragen.length) * 100);
    container.innerHTML = `
      <div class="text-center p-4">
        <p class="text-xl font-bold ${pct >= 70 ? 'text-green-700' : 'text-orange-600'} mb-2">
          ${pct >= 70 ? '🎉 Well done!' : '💪 Keep practicing!'}
        </p>
        <p class="text-3xl font-bold mb-4">${pct}%</p>
        <p class="text-gray-600 mb-6">${aantalCorrect} van ${vragen.length} correct</p>
        <button onclick="terugNaarSpelMenu()" class="px-6 py-2 bg-blue-600 text-white rounded-xl">
          ← Back naar spelletjes
        </button>
      </div>`;
    return;
  }

  const vraag = vragen[huidigeVraag];

  container.innerHTML = `
    <div class="text-center">
      <p class="text-sm text-gray-500 mb-4">Sentence builder — ${huidigeVraag + 1}/${vragen.length}</p>

      <!-- Geplaatste woorden (de zin die de leerder bouwt) -->
      <div class="min-h-16 p-4 mb-4 bg-blue-50 rounded-xl flex flex-wrap gap-2 justify-end" dir="rtl" id="zb-geplaatst">
        ${vraag.geplaatst.map((w, i) => `
          <button onclick="zinsbouwerVerwijder(${i})"
                  class="px-3 py-2 bg-blue-600 text-white rounded-lg font-hebrew"
                  dir="rtl" lang="he">${w}</button>
        `).join('')}
        ${vraag.geplaatst.length === 0 ? '<p class="text-gray-400 text-sm w-full">Tap words to build the sentence</p>' : ''}
      </div>

      <!-- Beschikbare woorden -->
      <div class="flex flex-wrap gap-2 justify-center mb-6" id="zb-beschikbaar">
        ${vraag.geschud.filter(w => !vraag.geplaatst.includes(w)).map(w => `
          <button onclick="zinsbouwerPlaats('${w.replace(/'/g, "\\'")}')"
                  class="px-3 py-2 bg-white border-2 border-gray-200 rounded-lg font-hebrew
                         hover:border-blue-400"
                  dir="rtl" lang="he">${w}</button>
        `).join('')}
      </div>

      <div class="flex gap-2 justify-center">
        <button onclick="zinsbouwerControleer()"
                class="px-6 py-2 bg-green-600 text-white rounded-xl ${vraag.geplaatst.length === vraag.juisteVolgorde.length ? '' : 'opacity-50'}"
                ${vraag.geplaatst.length === vraag.juisteVolgorde.length ? '' : 'disabled'}>
          ✓ Check
        </button>
        <button onclick="zinsbouwerReset()"
                class="px-6 py-2 bg-gray-200 text-gray-700 rounded-xl">Reset</button>
      </div>
    </div>`;
}

function zinsbouwerPlaats(woord) {
  zinsbouwerStaat.vragen[zinsbouwerStaat.huidigeVraag].geplaatst.push(woord);
  // Verwijder eerste voorkomen uit geschud
  const geschud = zinsbouwerStaat.vragen[zinsbouwerStaat.huidigeVraag].geschud;
  const idx = geschud.indexOf(woord);
  if (idx !== -1) geschud.splice(idx, 1);
  renderZinsbouwer();
}

function zinsbouwerVerwijder(index) {
  const vraag = zinsbouwerStaat.vragen[zinsbouwerStaat.huidigeVraag];
  const woord = vraag.geplaatst.splice(index, 1)[0];
  vraag.geschud.push(woord);
  renderZinsbouwer();
}

function zinsbouwerReset() {
  const vraag = zinsbouwerStaat.vragen[zinsbouwerStaat.huidigeVraag];
  vraag.geschud = [...vraag.juisteVolgorde].sort(() => Math.random() - 0.5);
  vraag.geplaatst = [];
  renderZinsbouwer();
}

function zinsbouwerControleer() {
  const vraag = zinsbouwerStaat.vragen[zinsbouwerStaat.huidigeVraag];
  const correct = vraag.geplaatst.every((w, i) => w === vraag.juisteVolgorde[i]);

  if (correct) {
    zinsbouwerStaat.aantalCorrect++;
    AudioManager.spreekUit(vraag.origineel, 'vrouw');
    toonToast('Correct! ✓', 'success');
  } else {
    toonToast('Not quite right — try again', 'warning');
    zinsbouwerReset();
    return;
  }

  setTimeout(() => {
    zinsbouwerStaat.huidigeVraag++;
    renderZinsbouwer();
  }, 1500);
}

let shoreshStaat = null;

/**
 * Geeft shoresh-groepen terug waarvan alle woorden bekend zijn.
 * @param {number} lesNummer - Huidig lesnummer
 * @returns {Array<{shoresh: string, woorden: Array<Object>}>}
 */
function getBekendeShoreshGroepen(lesNummer) {
  if (!SPEL_DB) return [];
  const bekendIds = new Set(getSpelWoorden(lesNummer).map(w => w.id));
  const groepen = [];
  for (const [shoresh, ids] of Object.entries(SPEL_DB.shoresh_groepen)) {
    const woorden = ids
      .map(id => SPEL_DB.woorden.find(w => w.id === id))
      .filter(w => w && bekendIds.has(w.id));
    if (woorden.length >= 2) {
      groepen.push({ shoresh, woorden });
    }
  }
  return groepen;
}

/**
 * Start een nieuw Shoresh-sorteerspel.
 * @param {number} lesNummer - Huidig lesnummer
 */
function startShoreshSort(lesNummer) {
  const groepen = getBekendeShoreshGroepen(lesNummer);
  if (groepen.length < 2) {
    toonToast('Niet genoeg shoresh-groepen beschikbaar', 'warning');
    terugNaarSpelMenu();
    return;
  }

  const gekozen = kiesWillekeurig(groepen, Math.min(3, groepen.length));
  // Verzamel alle losse woorden en schud
  const losseWoorden = [];
  gekozen.forEach(g => {
    g.woorden.forEach(w => losseWoorden.push({ ...w, shoresh: g.shoresh }));
  });
  for (let i = losseWoorden.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [losseWoorden[i], losseWoorden[j]] = [losseWoorden[j], losseWoorden[i]];
  }

  shoreshStaat = {
    groepen: gekozen,
    losseWoorden,
    gesorteerd: Object.fromEntries(gekozen.map(g => [g.shoresh, []])),
    geselecteerd: null,
  };

  document.getElementById('game-shoresh-sort').classList.remove('hidden');
  renderShoreshSort();
}

/**
 * Rendert het Shoresh-sorteerspel.
 */
function renderShoreshSort() {
  const container = document.getElementById('shoresh-container');
  if (!container) return;
  const { groepen, losseWoorden, gesorteerd, geselecteerd } = shoreshStaat;

  const alGeplaatst = new Set(Object.values(gesorteerd).flat().map(w => w.id));
  const beschikbaar = losseWoorden.filter(w => !alGeplaatst.has(w.id));

  // Check klaar
  const klaar = beschikbaar.length === 0;

  container.innerHTML = `
    <div>
      <p class="text-sm text-gray-500 mb-4 text-center">Shoresh-sort — sort words by root</p>

      <!-- Shoresh-bakken -->
      <div class="grid grid-cols-${groepen.length} gap-3 mb-6">
        ${groepen.map(g => `
          <div onclick="shoreshKlikBak('${g.shoresh}')"
               class="p-3 rounded-xl border-2 text-center min-h-32 cursor-pointer
                      ${geselecteerd ? 'border-blue-400 hover:bg-blue-50' : 'border-gray-200'}">
            <p class="font-hebrew text-xl text-orange-700 mb-2" dir="rtl" lang="he">${g.shoresh}</p>
            <div class="space-y-1">
              ${(gesorteerd[g.shoresh] || []).map(w => `
                <div class="text-sm font-hebrew bg-green-50 rounded p-1" dir="rtl" lang="he">${w.he_clean}</div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Losse woorden -->
      ${!klaar ? `
      <div class="flex flex-wrap gap-2 justify-center mb-4">
        ${beschikbaar.map(w => `
          <button onclick="shoreshKlikWoord(${w.id})"
                  class="px-4 py-2 rounded-lg font-hebrew text-lg
                         ${geselecteerd === w.id ? 'bg-blue-600 text-white scale-105' : 'bg-white border-2 border-gray-200 hover:border-blue-400'}"
                  dir="rtl" lang="he">${w.he_clean}</button>
        `).join('')}
      </div>` : `
      <div class="text-center p-4">
        <p class="text-xl font-bold text-green-700 mb-3">🎉 All words sorted!</p>
        <button onclick="terugNaarSpelMenu()" class="px-6 py-2 bg-blue-600 text-white rounded-xl">
          ← Back naar spelletjes
        </button>
      </div>`}
    </div>`;
}

function shoreshKlikWoord(woordId) {
  shoreshStaat.geselecteerd = woordId;
  renderShoreshSort();
}

function shoreshKlikBak(shoresh) {
  if (!shoreshStaat.geselecteerd) return;
  const woord = shoreshStaat.losseWoorden.find(w => w.id === shoreshStaat.geselecteerd);
  if (!woord) return;

  const correct = woord.shoresh === shoresh;
  if (correct) {
    shoreshStaat.gesorteerd[shoresh].push(woord);
    registreerSpelResultaat(woord.id, 'shoresh-sort', true);
    spreekWoordUit(woord);
  } else {
    toonToast('That word belongs to a different root', 'warning');
    registreerSpelResultaat(woord.id, 'shoresh-sort', false);
  }
  shoreshStaat.geselecteerd = null;
  renderShoreshSort();
}

function dialoogPlaats(geschudIdx) {
  dialoogStaat.geplaatst.push(geschudIdx);

}

function dialoogReset() {
  dialoogStaat.geplaatst = [];
  renderDialoogpuzzel();
}

function dialoogCheck() {
  const { geschud, geplaatst, juisteVolgorde } = dialoogStaat;
  const correct = geplaatst.every((geschudIdx, i) =>
    geschud[geschudIdx].tekst === juisteVolgorde[i].tekst

  const el = document.getElementById('dialoog-resultaat');

    el.innerHTML = `

        <button onclick="dialoogReset(); renderDialoogpuzzel()"
                class="px-6 py-2 bg-blue-600 text-white rounded-xl">Again</button>
      </div>`;
  }
}

/**
 * Haalt liedtekst op met 4-staps fallback.
 * @param {Object} lied - Lied-object uit muziek_database.json
 * @returns {Promise<string|null>} Hebreeuwse tekst of null
 */
async function fetchLiedTekstMetFallback(lied) {
  const gecached = Opslag.laad(`${OPSLAG_PREFIXEN.lyric}${lied.id}`);
  if (gecached) return gecached;

  const shironetUrl = `https://shironet.mako.co.il/search?q=${encodeURIComponent(lied.shironet_zoek)}`;
  const tekst = await fetchVeilig(shironetUrl, 'Shironet')
             || await fetchVeilig(shironetUrl, 'Shironet-proxy', true)
             || await fetchVeilig(
                  `https://www.hebrewsongs.com/?song=${encodeURIComponent(lied.hebrewsongs_zoek)}`,
                  'HebrewSongs'
                )
             || null;

  if (tekst) Opslag.slaOp(`${OPSLAG_PREFIXEN.lyric}${lied.id}`, tekst);
  return tekst;
}

/**
 * Veilige fetch met timeout en optionele CORS-proxy.
 * @param {string} url - Te fetchen URL
 * @param {string} bron - Naam voor logging
 * @param {boolean} metProxy - Of CORS-proxy gebruikt moet worden
 * @returns {Promise<string|null>}
 */
async function fetchVeilig(url, bron, metProxy = false) {
  const fetchUrl = metProxy ? `${CORS_PROXY_URL}${encodeURIComponent(url)}` : url;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const resp = await fetch(fetchUrl, { signal: controller.signal });
    clearTimeout(timer);
    if (!resp.ok) return null;
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const el = doc.querySelector(SHIRONET_SELECTOR) || doc.querySelector('.lyrics');
    return el?.textContent?.trim() || null;
  } catch(fout) {
    AppLogger.debug('Fetch', `${bron} mislukt`, fout.message);
    return null;
  }
}

/**
 * Opent de muziekles-weergave voor een specifiek lied.
 * @param {number} liedId - ID van het lied
 */
async function openMusicLes(liedId) {
  if (!MUZIEK_DB) return;
  const lied = MUZIEK_DB.liederen.find(l => l.id === liedId);
  if (!lied) return;

  toonScherm('screen-music');
  const container = document.getElementById('muziek-container');
  container.innerHTML = `
    <div class="p-6">
      <div class="flex items-center gap-4 mb-4">
        <button onclick="renderMusicLijst(); toonScherm('screen-music')" class="text-2xl text-gray-400">←</button>
        <div>
          <h2 class="font-hebrew text-xl" dir="rtl" lang="he">${lied.he}</h2>
          <p class="text-sm text-gray-500">${lied.artiest} — ${lied.nl}</p>
        </div>
      </div>
      <p class="text-gray-500 text-center py-8">Loading lyrics...</p>
    </div>`;

  const tekst = await fetchLiedTekstMetFallback(lied);

  if (tekst) {
    const regels = tekst.split('\n').filter(r => r.trim());
    container.innerHTML = `
      <div class="p-6">
        <div class="flex items-center gap-4 mb-4">
          <button onclick="renderMusicLijst()" class="text-2xl text-gray-400">←</button>
          <div>
            <h2 class="font-hebrew text-xl" dir="rtl" lang="he">${lied.he}</h2>
            <p class="text-sm text-gray-500">${lied.artiest}</p>
          </div>
        </div>
        <div class="space-y-2 mb-6">
          ${regels.map((regel, i) => `
            <div onclick="AudioManager.spreekUit('${stripNikud(regel).replace(/'/g, "\\'")}', 'vrouw')"
                 class="font-hebrew text-lg p-2 rounded hover:bg-blue-50 cursor-pointer"
                 dir="rtl" lang="he">${regel}</div>
          `).join('')}
        </div>
      </div>`;
  } else {
    container.innerHTML = `
      <div class="p-6">
        <div class="flex items-center gap-4 mb-4">
          <button onclick="renderMusicLijst()" class="text-2xl text-gray-400">←</button>
          <h2 class="font-hebrew text-xl" dir="rtl" lang="he">${lied.he}</h2>
        </div>
        <p class="text-gray-500 text-center py-8">Lyrics not found. Try again later.</p>
      </div>`;
  }
}

/**
 * Toont het opgegeven scherm en verbergt alle andere schermen.
 * @param {string} schermId - ID van het te tonen scherm
 */
function toonScherm(schermId) {
  const SCHERMEN = [
    'screen-start', 'screen-onboarding', 'screen-lesson',
    'screen-review', 'screen-games', 'screen-music',
    'screen-progress', 'screen-settings'
  ];
  SCHERMEN.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('hidden', id !== schermId);
  });
  AppLogger.debug('UI', `Scherm: ${schermId}`);
}

/**
 * Slaat de instellingen op.
 * Azure sleutel in localStorage als 'ujes_azure_key'.
 * Stem in OPSLAG_PREFIXEN.instellingen.
 */
function slaSettingsOp() {
  const apiSleutel = document.getElementById('inst-api-key')?.value || '';
  const stem = document.getElementById('inst-stem')?.value || 'vrouw';

  // Sla Azure sleutel op als losse key
  localStorage.setItem('ujes_azure_key', apiSleutel);
  window.AZURE_API_SLEUTEL = apiSleutel || null;

  // Sla stem op
  Opslag.slaOp(OPSLAG_PREFIXEN.instellingen, { stem });

  toonToast('Settings opgeslagen', 'success');
}

async function runAllTests() {
  console.group('🧪 Ulpan Jes — Tests');
  const tests = [
    testDatabasesGeladen,
    testStripNikud,
    testKiesWillekeurig,
    testGetBekendWoorden,
    testGetNieuweWoorden,
    testGetBekendZinnen,
    testOpslagRondtrip,
    testSRSBerekening,
    testStreakRegistratie,
    testSchermWisseling,
  ];

  const resultaten = [];
  for (const test of tests) resultaten.push(await test());

  const geslaagd = resultaten.filter(r => r.ok).length;
  console.log(`\n${geslaagd === tests.length ? '✅' : '❌'} ${geslaagd}/${tests.length}`);
  console.groupEnd();
  toonTestRapport(resultaten);
}

async function testDatabasesGeladen() {
  const naam = 'Alle databases geladen';
  try {
    if (!VOCAB_DB?.woorden || VOCAB_DB.woorden.length < 1)
      throw new Error(`VOCAB_DB: ${VOCAB_DB?.woorden?.length} woorden`);
    if (!MUZIEK_DB?.liederen || MUZIEK_DB.liederen.length !== 105)
      throw new Error(`MUZIEK_DB: ${MUZIEK_DB?.liederen?.length} liedjes`);
    if (!SPEL_DB?.woorden) throw new Error('SPEL_DB ontbreekt');
    if (!OEFEN_DB?.zinnen || OEFEN_DB.zinnen.length < 50)
      throw new Error(`OEFEN_DB: ${OEFEN_DB?.zinnen?.length} zinnen`);
    console.log(`✅ ${naam}`);
    return { ok: true, naam };
  } catch(fout) {
    console.error(`❌ ${naam}:`, fout.message);
    return { ok: false, naam, fout: fout.message };
  }
}

}

function toonTestRapport(resultaten) {
  const geslaagd = resultaten.filter(r => r.ok).length;
  const rapport  = document.createElement('div');
  rapport.className = 'fixed top-0 left-0 right-0 z-50 bg-white border-b shadow-lg ' +
                      'p-4 text-sm font-mono overflow-y-auto max-h-64';
  rapport.innerHTML = `
    <div class="flex justify-between items-center mb-2">
      <strong>🧪 ${geslaagd}/${resultaten.length} tests geslaagd</strong>
      <button onclick="this.parentElement.parentElement.remove()"
              class="text-gray-400 px-2">✕</button>
    </div>
    ${resultaten.map(r => `
      <div class="${r.ok ? 'text-green-700' : 'text-red-600'}">
        ${r.ok ? '✅' : '❌'} ${r.naam}
        ${r.fout ? `<span class="text-xs text-gray-500 ml-2">— ${r.fout}</span>` : ''}
      </div>
    `).join('')}
  `;
  document.body.prepend(rapport);
}
