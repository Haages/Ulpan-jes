// ══════════════════════════════════════════════════════════════
// MODULE A: Constanten en configuratie
// ══════════════════════════════════════════════════════════════

const APP_VERSIE        = '1.0.0';
const APP_NAAM          = 'Ulpan Jes';
const AZURE_REGIO       = 'eastus';
const AZURE_RESOURCE    = 'ivriet-speech';
const TTS_STEM_MAN      = 'he-IL-AvriNeural';
const TTS_STEM_VROUW    = 'he-IL-HilaNeural';
const MAX_LES           = 19;
const CORS_PROXY_URL    = 'https://corsproxy.io/?';
const OPSLAG_PREFIXEN   = {
  voortgang:  'ujes_voortgang_',
  srs:        'ujes_srs_',
  lyric:      'ujes_lyric_',
  progress:   'ujes_progress_',
  spelScore:  'ujes_spelscore_',
  streak:     'ujes_streak',
  instellingen: 'ujes_instellingen',
};
const AANTAL_FASEN = 7;

// ══════════════════════════════════════════════════════════════
// MODULE B: Hulpfuncties (stripNikud, kiesWillekeurig, etc.)
// ══════════════════════════════════════════════════════════════

/**
 * Verwijdert nikud (vocalisatietekens) uit Hebreeuwse tekst.
 * ALTIJD gebruiken voordat tekst naar Azure TTS wordt gestuurd.
 * @param {string} tekst - Hebreeuwse tekst met of zonder nikud
 * @returns {string} Tekst zonder nikud
 */
function stripNikud(tekst) {
  if (!tekst) return '';
  return tekst.replace(/[\u0591-\u05C7]/g, '');
}

/**
 * Selecteert n willekeurige unieke items uit een array.
 * @param {Array} arr - De bronarray
 * @param {number} n - Aantal te selecteren items
 * @returns {Array} Willekeurige selectie (nooit meer dan arr.length)
 */
function kiesWillekeurig(arr, n) {
  if (!arr || arr.length === 0) return [];
  if (arr.length <= n) return [...arr].sort(() => Math.random() - 0.5);
  const kopie = [...arr];
  const resultaat = [];
  for (let i = 0; i < n; i++) {
    const idx = Math.floor(Math.random() * kopie.length);
    resultaat.push(kopie.splice(idx, 1)[0]);
  }
  return resultaat;
}

/**
 * Formatteert een datum als Nederlandse string.
 * @param {Date} datum - De te formatteren datum
 * @returns {string} Geformatteerde datum (bijv. "8 april 2026")
 */
function formatteerDatum(datum) {
  return datum.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
}

/**
 * Geeft een unieke sleutel voor een woord (woorden hebben geen id-veld).
 * @param {Object} woord - Woordobject met he_clean
 * @returns {string} Unieke sleutel
 */
function woordSleutel(woord) {
  return stripNikud(woord.he_clean).toLowerCase();
}

// ══════════════════════════════════════════════════════════════
// MODULE C: AppLogger en foutafhandeling
// ══════════════════════════════════════════════════════════════

const AppLogger = {
  DEBUG: new URLSearchParams(window.location.search).has('debug'),

  info  (ctx, msg, data = null) { console.log  (`[${ctx}]`, msg, data ?? ''); },
  warn  (ctx, msg, data = null) { console.warn (`[${ctx}]`, msg, data ?? ''); },
  error (ctx, msg, fout = null) {
    console.error(`[${ctx}]`, msg, fout ?? '');
    toonToast(msg, 'error');
  },
  debug (ctx, msg, data = null) {
    if (this.DEBUG) console.debug(`[${ctx}] DEBUG:`, msg, data ?? '');
  }
};

/**
 * Toont een niet-blokkerende melding rechtsonder in beeld.
 * @param {string} bericht - De te tonen tekst
 * @param {'error'|'warning'|'info'|'success'} type - Type melding
 */
function toonToast(bericht, type = 'info') {
  const KLEUREN = {
    error:   'bg-red-100 border-red-400 text-red-800',
    warning: 'bg-yellow-100 border-yellow-400 text-yellow-800',
    info:    'bg-blue-100 border-blue-400 text-blue-800',
    success: 'bg-green-100 border-green-400 text-green-800',
  };
  const toast = document.createElement('div');
  toast.className = `fixed bottom-4 right-4 z-50 p-3 border rounded-lg shadow-lg
                     ${KLEUREN[type] || KLEUREN.info} text-sm max-w-xs transition-opacity duration-300`;
  toast.textContent = bericht;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4700);
}

// ══════════════════════════════════════════════════════════════
// MODULE D: Database laden en vocabulaire-bewaking
// ══════════════════════════════════════════════════════════════

let VOCAB_DB = null;
let MUZIEK_DB = null;
let SPEL_DB = null;
let OEFEN_DB = null;

/**
 * Laadt alle vier databases bij app-start.
 * Slaat ze op als window-variabelen voor globale toegang.
 */
async function laadAlleDatabases() {
  try {
    const [v, m, s, o] = await Promise.all([
      fetch('vocab_database.json'),
      fetch('muziek_database.json'),
      fetch('spelletjes_database.json'),
      fetch('oefenzinnen.json'),
    ]);

    if (!v.ok || !m.ok || !s.ok || !o.ok)
      throw new Error('Een of meer databases niet beschikbaar');

    VOCAB_DB  = await v.json();
    MUZIEK_DB = await m.json();
    SPEL_DB   = await s.json();
    OEFEN_DB  = await o.json();

    window.VOCAB_DB  = VOCAB_DB;
    window.MUZIEK_DB = MUZIEK_DB;
    window.SPEL_DB   = SPEL_DB;
    window.OEFEN_DB  = OEFEN_DB;

    AppLogger.info('DB', `Databases geladen: ${VOCAB_DB.woorden.length} woorden, ${MUZIEK_DB.liederen.length} liedjes, ${OEFEN_DB.zinnen.length} zinnen`);
  } catch(fout) {
    AppLogger.error('DB', 'Databases laden mislukt', fout);
  }
}

/**
 * Geeft alle woorden terug die de leerder kent tot en met de opgegeven les.
 * @param {number} lesNummer - Huidig lesnummer (1-19)
 * @returns {Array<Object>} Array van woordobjecten (gededupliceerd)
 */
function getBekendWoorden(lesNummer) {
  if (!VOCAB_DB) return [];
  const sleutel   = String(Math.min(lesNummer, MAX_LES));
  const bekendSet = new Set(
    (VOCAB_DB.bekendNaLes[sleutel] || []).map(w => stripNikud(w).toLowerCase())
  );
  const gezien = new Set();
  return VOCAB_DB.woorden.filter(w => {
    const key = woordSleutel(w);
    if (!bekendSet.has(key) || gezien.has(key)) return false;
    gezien.add(key);
    return true;
  });
}

/**
 * Berekent welk percentage van een Hebreeuwse tekst de leerder al kent.
 * @param {string} hebreeuws - De te analyseren tekst
 * @param {number} lesNummer - Huidig lesnummer
 * @returns {number} Percentage 0-100
 */
function berekenBekendPercentage(hebreeuws, lesNummer) {
  if (!VOCAB_DB || !hebreeuws) return 0;
  const bekendSet = new Set(
    (VOCAB_DB.bekendNaLes[String(Math.min(lesNummer, MAX_LES))] || [])
      .map(w => stripNikud(w).toLowerCase())
  );
  const woorden = stripNikud(hebreeuws).split(/\s+/).filter(w => w.length > 1);
  if (woorden.length === 0) return 0;
  const bekendAantal = woorden.filter(w =>
    bekendSet.has(w.replace(/[^\u05d0-\u05ea]/g, '').toLowerCase())
  ).length;
  return Math.round((bekendAantal / woorden.length) * 100);
}

// ══════════════════════════════════════════════════════════════
// MODULE E: Lokale opslag (localStorage wrapper)
// ══════════════════════════════════════════════════════════════

const Opslag = {
  /**
   * Slaat een waarde op in localStorage.
   * @param {string} sleutel - De opslagsleutel
   * @param {any} waarde - De op te slaan waarde (wordt geserialiseerd)
   */
  slaOp(sleutel, waarde) {
    try {
      localStorage.setItem(sleutel, JSON.stringify(waarde));
    } catch(fout) {
      AppLogger.warn('Opslag', `Opslaan mislukt voor sleutel: ${sleutel}`, fout.message);
    }
  },

  /**
   * Laadt een waarde uit localStorage.
   * @param {string} sleutel - De opslagsleutel
   * @param {any} standaard - Standaardwaarde als sleutel niet bestaat
   * @returns {any} De geladen waarde of de standaardwaarde
   */
  laad(sleutel, standaard = null) {
    try {
      const raw = localStorage.getItem(sleutel);
      return raw ? JSON.parse(raw) : standaard;
    } catch(fout) {
      AppLogger.warn('Opslag', `Laden mislukt voor sleutel: ${sleutel}`);
      return standaard;
    }
  },

  /**
   * Verwijdert een waarde uit localStorage.
   * @param {string} sleutel - De te verwijderen sleutel
   */
  verwijder(sleutel) {
    localStorage.removeItem(sleutel);
  }
};

// ══════════════════════════════════════════════════════════════
// MODULE F: Azure TTS (AudioManager) + Web Speech API fallback
// ══════════════════════════════════════════════════════════════

const AudioManager = {
  AZURE_ENDPOINT: `https://${AZURE_REGIO}.tts.speech.microsoft.com/cognitiveservices/v1`,
  stem: TTS_STEM_VROUW,
  bezig: false,

  /**
   * Spreekt een Hebreeuwse tekst uit via Azure TTS.
   * Verwijdert altijd nikud voordat tekst naar de API wordt gestuurd.
   * Valt terug op Web Speech API als Azure niet beschikbaar is.
   *
   * @param {string} tekst - Hebreeuwse tekst (mag nikud bevatten)
   * @param {string} stem - 'man' (Avri) of 'vrouw' (Hila)
   * @returns {Promise<boolean>} true bij succes, false bij mislukking
   */
  async spreekUit(tekst, stem = 'vrouw') {
    if (!tekst?.trim()) {
      AppLogger.warn('TTS', 'Lege tekst doorgegeven');
      return false;
    }

    const stemNaam         = stem === 'man' ? TTS_STEM_MAN : TTS_STEM_VROUW;
    const tekstZonderNikud = stripNikud(tekst.trim());
    const apiSleutel       = this._getApiSleutel();

    // Probeer Azure TTS als API-sleutel beschikbaar is
    if (apiSleutel) {
      const ssml = `<speak version='1.0' xml:lang='he-IL'>
        <voice name='${stemNaam}'>${tekstZonderNikud}</voice>
      </speak>`;

      try {
        AppLogger.debug('TTS', `Spreek uit (${stemNaam})`, tekstZonderNikud);
        this.bezig = true;

        const resp = await fetch(this.AZURE_ENDPOINT, {
          method: 'POST',
          headers: {
            'Ocp-Apim-Subscription-Key': apiSleutel,
            'Content-Type': 'application/ssml+xml',
            'X-Microsoft-OutputFormat': 'audio-16khz-128kbitrate-mono-mp3',
          },
          body: ssml,
        });

        if (!resp.ok) throw new Error(`Azure TTS HTTP ${resp.status}`);

        const audioBlob = await resp.blob();
        const audioUrl  = URL.createObjectURL(audioBlob);
        const audio     = new Audio(audioUrl);

        await new Promise((resolve, reject) => {
          audio.onended = resolve;
          audio.onerror = reject;
          audio.play();
        });

        URL.revokeObjectURL(audioUrl);
        this.bezig = false;
        return true;

      } catch(fout) {
        this.bezig = false;
        AppLogger.debug('TTS', 'Azure TTS mislukt, probeer fallback', fout.message);
      }
    }

    // Fallback: Web Speech API
    return this._webSpeechFallback(tekstZonderNikud);
  },

  /**
   * Web Speech API fallback.
   * @param {string} tekst - Tekst zonder nikud
   * @returns {Promise<boolean>}
   * @private
   */
  _webSpeechFallback(tekst) {
    return new Promise(resolve => {
      if (!window.speechSynthesis) {
        AppLogger.debug('TTS', 'Geen spraaksynthese beschikbaar');
        resolve(false);
        return;
      }
      const utt = new SpeechSynthesisUtterance(tekst);
      utt.lang = 'he-IL';
      utt.rate = 0.85;
      const stemmen = speechSynthesis.getVoices();
      const heStem = stemmen.find(s => s.lang.startsWith('he'));
      if (heStem) utt.voice = heStem;
      utt.onend = () => resolve(true);
      utt.onerror = () => resolve(false);
      speechSynthesis.cancel();
      speechSynthesis.speak(utt);
    });
  },

  /**
   * Haalt de Azure API-sleutel op uit de app-configuratie.
   * @returns {string|null} De API-sleutel of null
   * @private
   */
  _getApiSleutel() {
    return window.AZURE_API_SLEUTEL || null;
  }
};

// Laad stemmen zodra beschikbaar
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => {
    AppLogger.debug('TTS', `${speechSynthesis.getVoices().length} stemmen geladen`);
  };
}

// ══════════════════════════════════════════════════════════════
// MODULE G: SRS-engine (SM-2 algoritme)
// ══════════════════════════════════════════════════════════════

const SRSEngine = {
  /**
   * Berekent het nieuwe SRS-interval na een antwoord.
   * Gebaseerd op het SM-2 algoritme van SuperMemo.
   *
   * @param {Object} huidigSRS - Huidige SRS-data van het woord
   * @param {number} kwaliteit - Antwoordkwaliteit 0-5 (0=fout, 5=perfect)
   * @returns {Object} Bijgewerkte SRS-data
   */
  berekenNieuwInterval(huidigSRS, kwaliteit) {
    let { interval, easiness, repetitions } = huidigSRS;

    if (kwaliteit < 3) {
      repetitions = 0;
      interval    = 1;
    } else {
      if (repetitions === 0)      interval = 1;
      else if (repetitions === 1) interval = 6;
      else                        interval = Math.round(interval * easiness);

      easiness = Math.max(1.3, easiness + 0.1 - (5 - kwaliteit) * (0.08 + (5 - kwaliteit) * 0.02));
      repetitions++;
    }

    const volgendeHerhaling = new Date();
    volgendeHerhaling.setDate(volgendeHerhaling.getDate() + interval);

    return { interval, easiness, repetitions,
             volgendeHerhaling: volgendeHerhaling.toISOString().split('T')[0] };
  },

  /**
   * Geeft woorden terug die vandaag herhaald moeten worden.
   * @param {number} lesNummer - Huidig lesnummer
   * @returns {Array<Object>} Te herhalen woorden
   */
  getWoordenVoorHerhaling(lesNummer) {
    const vandaag     = new Date().toISOString().split('T')[0];
    const bekendWords = getBekendWoorden(lesNummer);

    return bekendWords.filter(woord => {
      const srs = Opslag.laad(`${OPSLAG_PREFIXEN.srs}${woordSleutel(woord)}`);
      if (!srs) return true;
      return srs.volgendeHerhaling <= vandaag;
    });
  },

  /**
   * Registreert een antwoord en slaat de nieuwe SRS-data op.
   * @param {string} key - Unieke sleutel van het woord
   * @param {number} kwaliteit - Antwoordkwaliteit 0-5
   */
  registreerAntwoord(key, kwaliteit) {
    const sleutel   = `${OPSLAG_PREFIXEN.srs}${key}`;
    const huidigSRS = Opslag.laad(sleutel, { interval: 1, easiness: 2.5, repetitions: 0 });
    const nieuwSRS  = this.berekenNieuwInterval(huidigSRS, kwaliteit);
    Opslag.slaOp(sleutel, nieuwSRS);
    AppLogger.debug('SRS', `${key}: q=${kwaliteit}, interval=${nieuwSRS.interval}d`);
  }
};

// ══════════════════════════════════════════════════════════════
// MODULE H: StreakManager
// ══════════════════════════════════════════════════════════════

const StreakManager = {
  /**
   * Registreert activiteit voor vandaag en werkt de streak bij.
   */
  registreerActiviteit() {
    const vandaag  = new Date().toISOString().split('T')[0];
    const streak   = Opslag.laad(OPSLAG_PREFIXEN.streak, {
      huidig: 0, langste: 0, laatste: null
    });

    const gisteren = new Date();
    gisteren.setDate(gisteren.getDate() - 1);
    const gisterenStr = gisteren.toISOString().split('T')[0];

    if (streak.laatste === vandaag) return;

    if (streak.laatste === gisterenStr) {
      streak.huidig++;
    } else {
      streak.huidig = 1;
    }

    streak.langste = Math.max(streak.langste, streak.huidig);
    streak.laatste = vandaag;
    Opslag.slaOp(OPSLAG_PREFIXEN.streak, streak);
    AppLogger.info('Streak', `Dag ${streak.huidig} (langste: ${streak.langste})`);
  },

  /**
   * Geeft de huidige streakdata terug.
   * @returns {{huidig: number, langste: number, laatste: string}}
   */
  getStreak() {
    return Opslag.laad(OPSLAG_PREFIXEN.streak, { huidig: 0, langste: 0, laatste: null });
  }
};

// ══════════════════════════════════════════════════════════════
// MODULE I: Leercyclus (7 fasen per les — pedagogisch ontwerp)
// ══════════════════════════════════════════════════════════════

// Fase 1: Luisteren — woord horen zonder tekst
// Fase 2: Herhalen / shadowing — naspreken
// Fase 3: Begrijpen zonder vertaling — tekst zien, betekenis raden
// Fase 4: Woordbeeldtraining — Hebreeuws schrift herkennen
// Fase 5: Produceren — Nederlands horen, Hebreeuws kiezen
// Fase 6: Oefenzinnen — authentieke zinnen uit classwork
// Fase 7: Consolidatie — overzicht, SRS-update, spelletjes ontgrendelen

let huidigeLesData = null;

/**
 * Geeft het huidige lesnummer terug.
 * @returns {number}
 */
function huidigeLes() {
  return Opslag.laad('ujes_huidigeles', 1);
}

/**
 * Start een les voor het opgegeven lesnummer.
 * @param {number} lesNummer - Te starten lesnummer
 */
function startLes(lesNummer) {
  if (!VOCAB_DB || !OEFEN_DB) {
    AppLogger.error('Les', 'Databases niet geladen');
    return;
  }
  if (lesNummer < 1 || lesNummer > MAX_LES) {
    toonToast('Alle lessen voltooid!', 'success');
    return;
  }

  // Nieuwe woorden: bekend na deze les minus bekend na vorige les
  const alleBekendeWoorden     = getBekendWoorden(lesNummer);
  const vorigeBekendeWoorden   = lesNummer > 1 ? getBekendWoorden(lesNummer - 1) : [];
  const vorigeKeys             = new Set(vorigeBekendeWoorden.map(w => woordSleutel(w)));
  const nieuweWoorden          = alleBekendeWoorden.filter(w => !vorigeKeys.has(woordSleutel(w)));

  // Oefenzinnen voor deze les
  const lesZinnen = OEFEN_DB.zinnen.filter(z => parseInt(z.les) === lesNummer);

  if (nieuweWoorden.length === 0) {
    toonToast(`Les ${lesNummer}: geen nieuwe woorden gevonden`, 'warning');
    return;
  }

  huidigeLesData = {
    lesNummer,
    nieuweWoorden,
    oefenzinnen: lesZinnen,
    huidigeFase: 1,
  };

  StreakManager.registreerActiviteit();
  AppLogger.info('Les', `Les ${lesNummer}: ${nieuweWoorden.length} nieuwe woorden, ${lesZinnen.length} zinnen`);

  toonScherm('screen-lesson');
  toonFase(1);
}

/**
 * Toont de opgegeven fase van de huidige les.
 * @param {number} faseNummer - Fase 1-7
 */
function toonFase(faseNummer) {
  if (!huidigeLesData) return;
  huidigeLesData.huidigeFase = faseNummer;
  const fasen = {
    1: toonFase1_Luisteren,
    2: toonFase2_Shadowing,
    3: toonFase3_BegrijpenZonderVertaling,
    4: toonFase4_Woordbeeldtraining,
    5: toonFase5_Produceren,
    6: toonFase6_Oefenzinnen,
    7: toonFase7_Consolidatie,
  };
  const faseFn = fasen[faseNummer];
  if (faseFn) faseFn();
  else AppLogger.error('Les', `Ongeldige fase: ${faseNummer}`);
}

/**
 * Rendert de fase-header met voortgangsbalk.
 * @param {string} titel - Fasetitel
 * @param {number} faseNr - Huidig fasenummer
 * @param {string} subtitel - Korte beschrijving
 * @returns {string} HTML
 */
function faseHeader(titel, faseNr, subtitel) {
  return `
    <div class="flex justify-between items-center mb-4">
      <button onclick="toonScherm('screen-start'); renderStartScherm();" class="text-gray-400 text-sm hover:text-gray-600">Stoppen</button>
      <p class="text-sm text-gray-500">Fase ${faseNr}/${AANTAL_FASEN} — ${titel}</p>
      <span class="text-sm text-gray-400">Les ${huidigeLesData.lesNummer}</span>
    </div>
    <p class="text-xs text-gray-400 mb-4 text-center">${subtitel}</p>
    <div class="w-full bg-gray-200 rounded-full h-1.5 mb-6">
      <div class="bg-blue-600 h-1.5 rounded-full" style="width:${Math.round((faseNr / AANTAL_FASEN) * 100)}%"></div>
    </div>`;
}

// ── Fase 1: Luisteren ─────────────────────────────────────────
// Horen gaat vóór lezen. Elk woord 1x uitgesproken, alleen NL vertaling zichtbaar.

function toonFase1_Luisteren() {
  const container = document.getElementById('les-fase-container');
  if (!container) return;
  const woorden = huidigeLesData.nieuweWoorden;
  let idx = 0;

  function render() {
    if (idx >= woorden.length) { toonFase(2); return; }

// ── Fase 5: Produceren ────────────────────────────────────────
// Nederlands getoond, leerder kiest uit 4 Hebreeuwse opties.

function toonFase5_Produceren() {
  const container = document.getElementById('les-fase-container');
  if (!container) return;
  const woorden     = huidigeLesData.nieuweWoorden;
  const alleWoorden = getBekendWoorden(huidigeLesData.lesNummer);
  let idx = 0;
  let score = 0;

  function render() {
    if (idx >= woorden.length) {
      const kwaliteit = score > woorden.length * 0.7 ? 4 : 2;
      woorden.forEach(w => SRSEngine.registreerAntwoord(woordSleutel(w), kwaliteit));
      toonFase(6);
      return;
    }
    const juist    = woorden[idx];
    const juistKey = woordSleutel(juist);
    const afleiders = kiesWillekeurig(
      alleWoorden.filter(w => woordSleutel(w) !== juistKey), 3
    );
    const keuzes = kiesWillekeurig([juist, ...afleiders], 4);

    container.innerHTML = `
      <div class="p-6">
        ${faseHeader('Produceren', 5, 'Welk Hebreeuws woord hoort bij de Nederlandse betekenis?')}
        <div class="bg-white rounded-2xl shadow-sm p-6 text-center mb-6">
          <p class="text-xl font-semibold">${juist.nl}</p>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
          ${keuzes.map(k => `
            <button class="fase5-btn p-4 border-2 border-gray-200 rounded-xl font-hebrew text-xl
                           hover:border-blue-400 transition-all bg-white"
                    dir="rtl" lang="he"
                    data-key="${woordSleutel(k)}" data-juist="${juistKey}">
              ${k.he_clean}
            </button>`).join('')}
        </div>
        <div class="text-center text-sm text-gray-400">${idx + 1} / ${woorden.length} — Score: ${score}</div>
      </div>`;

    container.querySelectorAll('.fase5-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const correct = this.dataset.key === juistKey;
        if (correct) score++;
        container.querySelectorAll('.fase5-btn').forEach(b => {
          b.style.pointerEvents = 'none';
          if (b.dataset.key === juistKey) b.classList.add('bg-green-100', 'border-green-500');
          else if (b === btn && !correct) b.classList.add('bg-red-100', 'border-red-500');
        });
        if (correct) AudioManager.spreekUit(juist.he_clean, 'vrouw');
        setTimeout(() => { idx++; render(); }, 1200);
      });
    });
  }
  render();
}

if (new URLSearchParams(window.location.search).has('test')) {

async function runAllTests() {
  console.group('Ulpan Jes — Testresultaten');
  const tests = [
    testDatabasesGeladen,
    testStripNikud,
    testKiesWillekeurig,
    testBekendWoorden,
    testBerekenBekendPercentage,
    testOpslagOpslaanLaden,
    testSRSBerekening,
    testStreakRegistratie,
    testTTSBeschikbaar,
    testSchermWisseling,
  ];

  const resultaten = [];
  for (const test of tests) resultaten.push(await test());

  const geslaagd = resultaten.filter(r => r.ok).length;
  console.log(`${geslaagd === tests.length ? 'PASS' : 'FAIL'} ${geslaagd}/${tests.length} geslaagd`);
  console.groupEnd();
  toonTestRapport(resultaten);
}

async function testDatabasesGeladen() {
  const naam = 'Alle databases geladen';
  try {
    if (!VOCAB_DB?.woorden || VOCAB_DB.woorden.length < 200) throw new Error('VOCAB_DB onvolledig');
    if (!MUZIEK_DB?.liederen || MUZIEK_DB.liederen.length !== 105) throw new Error('MUZIEK_DB onvolledig');
    if (!SPEL_DB?.woorden) throw new Error('SPEL_DB ontbreekt');
    if (!OEFEN_DB?.zinnen || OEFEN_DB.zinnen.length < 50) throw new Error('OEFEN_DB onvolledig');
    console.log(`PASS ${naam}`);
    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

async function testStripNikud() {
  const naam = 'stripNikud()';
  try {
    if (stripNikud('\u05E9\u05C1\u05B8\u05DC\u05D5\u05B9\u05DD') !== '\u05E9\u05DC\u05D5\u05DD') throw new Error('Nikud niet verwijderd');
    if (stripNikud('') !== '') throw new Error('Lege string');
    if (stripNikud(null) !== '') throw new Error('null');
    console.log(`PASS ${naam}`);
    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

async function testKiesWillekeurig() {
  const naam = 'kiesWillekeurig()';
  try {
    const arr = [1,2,3,4,5];
    if (kiesWillekeurig(arr, 3).length !== 3) throw new Error('Verkeerd aantal');
    if (new Set(kiesWillekeurig(arr, 3)).size !== 3) throw new Error('Duplicaten');
    if (kiesWillekeurig([], 3).length !== 0) throw new Error('Lege array');
    console.log(`PASS ${naam}`);
    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

async function testBekendWoorden() {
  const naam = 'getBekendWoorden()';
  try {
    const les1 = getBekendWoorden(1);
    const les10 = getBekendWoorden(10);
    if (les1.length === 0) throw new Error('Les 1 geeft 0 woorden');

    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

}

async function testOpslagOpslaanLaden() {
  const naam = 'Opslag.slaOp() en Opslag.laad()';
  try {
    Opslag.slaOp('test_sleutel', { waarde: 42 });
    const geladen = Opslag.laad('test_sleutel');

    Opslag.verwijder('test_sleutel');

    console.log(`PASS ${naam}`);
    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

async function testSRSBerekening() {
  const naam = 'SRSEngine.berekenNieuwInterval()';
  try {
    const begin = { interval: 1, easiness: 2.5, repetitions: 0 };
    const na5   = SRSEngine.berekenNieuwInterval(begin, 5);
    if (na5.interval < 1) throw new Error('Interval < 1');
    if (na5.repetitions !== 1) throw new Error('Repetitions moet 1 zijn');
    const na0   = SRSEngine.berekenNieuwInterval(na5, 0);
    if (na0.repetitions !== 0) throw new Error('Na fout: repetitions moet 0 zijn');
    console.log(`PASS ${naam}`);
    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

async function testStreakRegistratie() {
  const naam = 'StreakManager.registreerActiviteit()';
  try {
    StreakManager.registreerActiviteit();
    const streak = StreakManager.getStreak();
    if (typeof streak.huidig !== 'number') throw new Error('huidig geen getal');
    if (streak.huidig < 1) throw new Error('huidig < 1');
    console.log(`PASS ${naam} — dag ${streak.huidig}`);
    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

async function testTTSBeschikbaar() {
  const naam = 'AudioManager beschikbaar';
  try {
    if (typeof AudioManager.spreekUit !== 'function') throw new Error('spreekUit ontbreekt');
    const r = await AudioManager.spreekUit('');
    if (r !== false) throw new Error('Lege tekst moet false geven');
    console.log(`PASS ${naam}`);
    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

async function testSchermWisseling() {
  const naam = 'toonScherm() navigatie';
  try {
    toonScherm('screen-start');
    const start = document.getElementById('screen-start');
    if (!start || start.classList.contains('hidden')) throw new Error('start niet zichtbaar');
    toonScherm('screen-games');
    if (!start.classList.contains('hidden')) throw new Error('start nog zichtbaar');
    toonScherm('screen-start');
    console.log(`PASS ${naam}`);
    return { ok: true, naam };
  } catch(fout) { console.error(`FAIL ${naam}:`, fout.message); return { ok: false, naam, fout: fout.message }; }
}

function toonTestRapport(resultaten) {
  const geslaagd = resultaten.filter(r => r.ok).length;
  const rapport  = document.createElement('div');
  rapport.className = 'fixed top-0 left-0 right-0 z-50 bg-white border-b shadow-lg p-4 text-sm font-mono overflow-y-auto max-h-64';
  rapport.innerHTML = `
    <div class="flex justify-between items-center mb-2">
      <strong>${geslaagd}/${resultaten.length} tests geslaagd</strong>
      <button onclick="this.parentElement.parentElement.remove()" class="text-gray-400 px-2">X</button>
    </div>
    ${resultaten.map(r => `
      <div class="${r.ok ? 'text-green-700' : 'text-red-600'}">
        ${r.ok ? 'PASS' : 'FAIL'} ${r.naam}
        ${r.fout ? `<span class="text-xs text-gray-500 ml-2">— ${r.fout}</span>` : ''}
      </div>
    `).join('')}
  `;
  document.body.prepend(rapport);
}
