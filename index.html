<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d4ed8">
  <title>Ulpan Jes</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Hebreeuws lettertype — self-hosted, werkt ook offline ── */
    @font-face {
      font-family: 'GveretLevin';
      src: url('GveretLevinAlefAlefAlef-Regular.woff2') format('woff2'),
           url('GveretLevinAlefAlefAlef-Regular.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    .font-hebrew {
      font-family: 'GveretLevin', 'Times New Roman', serif;
      direction: rtl;
    }
    [dir="rtl"] { direction: rtl; }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <div id="app" class="max-w-md mx-auto min-h-screen">

    <div id="screen-start"></div>
    <div id="screen-onboarding" class="hidden"></div>

    <div id="screen-lesson" class="hidden">
      <div id="les-fase-container" class="min-h-screen"></div>
    </div>

    <div id="screen-review"   class="hidden"></div>

    <div id="screen-games" class="hidden">
      <div id="games-menu"></div>
      <div id="game-memory"        class="hidden">
        <div id="memory-bord" class="flex flex-wrap gap-2 p-4"></div>
        <div id="memory-scores" class="text-center text-sm text-gray-600 mt-2"></div>
        <div id="memory-einde" class="hidden text-center mt-4"></div>
      </div>
      <div id="game-vertaalkeuze"  class="hidden">
        <div id="vertaal-container" class="max-w-md mx-auto p-4"></div>
      </div>
      <div id="game-woordzoeker"   class="hidden">
        <div class="p-4">
          <div id="zoeker-raster"></div>
          <div id="zoeker-woordenlijst" class="mt-4 space-y-1"></div>
        </div>
      </div>
      <div id="game-wordle"        class="hidden">
        <div id="wordle-container" class="max-w-sm mx-auto p-4"></div>
      </div>
      <div id="game-zinsbouwer"    class="hidden">
        <div id="zinsbouwer-container" class="max-w-lg mx-auto p-4"></div>
      </div>
      <div id="game-shoresh-sort"  class="hidden">
        <div id="shoresh-container" class="p-4"></div>
      </div>
      <div id="game-dialoogpuzzel" class="hidden">
        <div id="dialoog-container" class="max-w-lg mx-auto p-4"></div>
      </div>
    </div>

    <div id="screen-music"    class="hidden">
      <div id="muziek-container"></div>
    </div>
    <div id="screen-progress" class="hidden"></div>
    <div id="screen-settings" class="hidden"></div>
  </div>

  <script>
    /* ══════════════════════════════════════════════════════════
       ALLE JAVASCRIPT HIER — modules A t/m N in volgorde
       ══════════════════════════════════════════════════════════ */
  </script>
</body>
</html>
